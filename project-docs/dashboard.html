 cleanup for `appRuntimeState` keys; `maxDuration` on generate route.\n\n**Later (P2+):** Unified API error shape migration; repository layer; ISR for static shell; HTTP cache headers on GET APIs; DeepSeek streaming; OpenTelemetry.\n\n## Explicitly not planned here\n\nItems listed under «Later (not now)» in `docs/BACKEND_ARCHITECTURE.md` remain deferred unless product asks.\n\n## How to update this file\n\n1. Move completed items to **Completed** with date.\n2. Add new items only when decided — link to `02-change-log.md` for shipped work.\n3. Do not duplicate full audit prose — point to `06-audits.md`.\n"}],"sources":{"overview":"# Viral — Project Overview\n\n> Single source of truth entry point. Last updated: 2026-05-30.\n\n## What this is\n\n**Viral** is a Next.js dashboard for discovering short-form videos (YouTube Shorts, Instagram Reels), tracking competitors, saving videos, viewing live trends, and generating scripts via DeepSeek.\n\n- **Runtime:** Next.js 16 (App Router), React 19, TypeScript\n- **Database:** PostgreSQL (Supabase) via Prisma 6\n- **Auth:** NextAuth v5 (JWT) + app `SessionUser` + cookie bridge\n- **Monetization:** Internal token wallet (`UserTokenBalance`)\n\n## Repository map\n\n| Path | Purpose |\n|------|---------|\n| `src/app/page.tsx` | SSR home → `HomeDashboard` |\n| `src/app/home-dashboard.tsx` | Dashboard shell, tabs, providers |\n| `src/app/api/**` | 34 API route handlers |\n| `src/lib/**` | Domain logic, ingest, tokens, trends, AI |\n| `src/components/dashboard/**` | Dashboard UI (intentionally stable layout) |\n| `prisma/schema.prisma` | Postgres schema |\n| `docs/BACKEND_ARCHITECTURE.md` | Backend guardrails (canonical for API/Prisma edits) |\n| `docs/project-audit-master.md` | Full CodeGraph audit (2026-05-30) |\n| `project-docs/` | This knowledge base |\n\n## Main user flows\n\n1. **Home / Search** — `SearchResultsSection` → `POST /api/videos/feed` (DB pick + optional YouTube/TikHub ingest)\n2. **Competitors** — `CompetitorSpySection` → `/api/competitors/*`\n3. **Saved** — `SavedVideosContext` → `/api/saved-videos`\n4. **Scripts** — `ScriptGeneratorSection` → `/api/script-generator/*` + DeepSeek\n5. **Trends** — `LiveTrendsSidebar` polls `GET /api/trends/realtime`; heavy refresh via `POST /api/trends/lazy-refresh`\n\n## Dev commands\n\n```bash\nnpm install\nnpx prisma generate\nnpx prisma migrate dev\nnpm run dev          # http://localhost:3000\nnpm run build\nnpm run seed:youtube\n```\n\n## Related docs\n\n- Backend rules: `docs/BACKEND_ARCHITECTURE.md`\n- Agent rules: `AGENTS.md`\n- Audits: `project-docs/06-audits.md`, `docs/project-audit-master.md`\n\n---\n\n# Services & Integrations\n\n> From `.env.example` and code references. Variables not in `.env.example` but used in code are marked **(code only)**.\n\n## Database — Supabase / PostgreSQL\n\n| Variable | Purpose |\n|----------|---------|\n| `DATABASE_URL` | App runtime (pooler, port 6543, `pgbouncer=true`) |\n| `DIRECT_URL` | Migrations / `prisma db push` (direct port 5432) |\n\nClient: Prisma 6. Legacy SQLite `prisma/dev.db` — not runtime.\n\n## Auth — NextAuth v5\n\n| Variable | Purpose |\n|----------|---------|\n| `AUTH_SECRET` | Session signing |\n| `AUTH_URL` | e.g. `http://localhost:3000` |\n| `AUTH_TRUST_HOST` | `true` for dev/proxy |\n| `AUTH_GOOGLE_ID` / `AUTH_GOOGLE_SECRET` | Google OAuth |\n\nProviders: Google (with email linking), credentials (email/password via `passwordHash` on `User`).\n\n## YouTube Data API\n\n| Variable | Purpose |\n|----------|---------|\n| `YOUTUBE_API_KEY` | Search + video details |\n\nUsed in: `src/lib/youtube.ts`, `src/lib/feed/ingest-youtube.ts`, `src/app/api/youtube/search/route.ts`, feed ingest branch.\n\nAlso caches in Prisma `SearchCache` (12h TTL) on `GET /api/youtube/search` — separate from main feed search path.\n\n## TikHub — Instagram\n\n| Variable | Purpose |\n|----------|---------|\n| `TIKHUB_TOKEN` | **(code only)** — Bearer for TikHub API |\n\nUsed in: `src/lib/providers/tikhubInstagram.ts`, feed Instagram ingest, competitor reels sync.\n\nBase URLs (from code): `api.tikhub.io` — search reels, user reels, post info.\n\n## DeepSeek — Script generation\n\nSee `project-docs/03-ai-prompts.md`.\n\n## Groq — Transcription (Whisper)\n\n| Variable | Purpose |\n|----------|---------|\n| `GROQ_API_KEY` | **(code only)** — fallback transcription |\n\nUsed in: `src/app/api/videos/transcribe/route.ts` (120s fetch timeout). Primary path may use subtitles when available.\n\n## Sentry\n\n| Variable | Purpose |\n|----------|---------|\n| `NEXT_PUBLIC_SENTRY_DSN` | Error reporting |\n| `SENTRY_ENABLED` | Force on in dev |\n| `SENTRY_ENVIRONMENT` | Environment tag |\n| `SENTRY_ORG` / `SENTRY_PROJECT` / `SENTRY_AUTH_TOKEN` | Source maps upload (CI) |\n\n## Admin\n\n| Variable | Purpose |\n|----------|---------|\n| `ADMIN_SECRET` | `/admin?key=...` and `/api/admin/*` |\n\n## Internal token economy\n\n- Default balance on new `SessionUser`: 12_400 (`token-wallet.ts`)\n- Feed “show more”: 5 tokens default (`TOKEN_COST` in feed route)\n- Script generation: `SCRIPT_GENERATION_TOKEN_COST` (default 20)\n- Competitor Instagram reels refresh: 30 tokens (`competitors/[competitorId]/reels/route.ts`)\n\n## External dependency map\n\n```\nBrowser\n  → Next.js API routes\n       → PostgreSQL (Prisma)\n       → YouTube Data API (feed ingest, youtube/search)\n       → TikHub (Instagram search, competitor reels)\n       → DeepSeek (script generate)\n       → Groq (transcribe fallback)\n       → Sentry (errors)\n```\n","architecture":"# Architecture\n\n> Derived from `docs/BACKEND_ARCHITECTURE.md`, codebase, and CodeGraph audits.\n\n## Layers\n\n| Layer | Path | Responsibility |\n|-------|------|----------------|\n| Route handlers | `src/app/api/**/route.ts` | HTTP: parse input, call lib, return JSON |\n| Domain / DB | `src/lib/**` | Prisma, scoring, trends, tokens, feed ingest |\n| AI | `src/lib/deepseek-generate.ts`, `script-generator-prompt.ts` | External LLM; server-only |\n| Serialize | `src/lib/serialize-video.ts`, `format-video.ts` | DB → client DTO |\n| Session | `src/lib/token-wallet.ts` | `ensureSessionUser`, token spend/credit |\n\n**Target:** routes stay thin; heavy logic in `src/lib/`. In practice `videos/feed/route.ts` still orchestrates ingest inline.\n\n## Dashboard composition\n\n```\npage.tsx (SSR fetchDashboardInitialPayload)\n  └── HomeDashboard\n        ├── AuthSessionProvider\n        ├── ToastProvider\n        ├── SavedVideosProvider\n        └── DashboardLayout\n              ├── aside: LiveTrendsSidebar + UserPanel (desktop)\n              └── main: DashboardTabPanel × tabs (hidden, not unmounted)\n                    ├── home: SearchResultsSection\n                    ├── competitors: CompetitorSpySection\n                    ├── saved: SavedVideosSection\n                    └── scripts: ScriptsSection → ScriptGeneratorSection\n```\n\n- Tab state: URL via `src/lib/dashboard-tab-url.ts`\n- `DashboardTabPanel`: keeps children mounted, toggles `hidden`\n- Pool protection: saved map/list fetches staggered 12s / 18s in `home-dashboard.tsx`\n\n## Auth model\n\n- **NextAuth** (`src/auth.ts`): Google + credentials, JWT session, `PrismaAdapter(getPrismaBase())`\n- **App user** (`SessionUser`): tokens, saved videos, chats, competitors\n- **Bridge** (`src/lib/auth-bridge.ts`): links `authUserId` to anonymous `viral_session_id` cookie on sign-in\n- **API entry:** `ensureSessionUser()` in `token-wallet.ts` — tries `auth()` first, else httpOnly cookie + DB row\n\n## Prisma clients\n\n| Export | File | Role |\n|--------|------|------|\n| `getPrismaBase()` | `prisma-base.ts` | Single `new PrismaClient()` — Auth adapter, register route |\n| `prisma` | `prisma.ts` | `getPrismaBase().$extends(...)` — Sentry on query errors (except `AdminEvent`) |\n\nRuntime app uses **one** underlying client; extended `prisma` wraps the same base (not a second pool).\n\n## Database\n\n- Provider: PostgreSQL (`DATABASE_URL` pooler + `DIRECT_URL` for migrations)\n- Legacy `prisma/dev.db`: migration/backup only, not runtime\n- Key models: `Video`, `SessionUser`, `UserTokenBalance`, `CompetitorAccount`, `ScriptChat`, `TrendItem`, `AdminEvent`, `AppRuntimeState`, `SearchCache`\n\n## Feed / search pipeline\n\n`POST /api/videos/feed`:\n\n1. `ensureSessionUser`\n2. Optional `searchQueryLog.create`\n3. `loadAndPick` — `video.findMany` (take 800) + in-memory filters + `pickSmartMixedBatch`\n4. If pool low / search needs fill: parallel `ingestYouTubeShortsForQuery` + TikHub Instagram upsert\n5. Second `loadAndPick` if ingest ran\n6. Token spend only on `action: \"more\"` (not initial search)\n\nExternal search throttle: `src/lib/search-throttle.ts` + `appRuntimeState` keys `external_search_{query}` (15 min).\n\n## Trends pipeline\n\n`ensure-trend-pool` → `TrendItem` queue → `GET /api/trends/realtime` (read-only poll) → sidebar. Heavy work: `POST /api/trends/lazy-refresh`.\n\n## Cache layers (client)\n\n- `src/lib/client-fetch-cache.ts` — memory + sessionStorage SWR, in-flight dedupe\n- `src/lib/dashboard-fetch.ts` — keyed loaders (home, trends, tokens, saved, competitors)\n- SSR seed: `seedDashboardFromSsr(initial)`\n- Home video count: lazy `GET /api/videos/home?countOnly=1` (filtered `HOME_VIDEO_WHERE`), not feed\n\n## Observability\n\n- stdout: `src/lib/server-log.ts`\n- `logAdminEvent()` — fail-safe, circuit breaker on pool errors (60s DB write cooldown)\n- Sentry: when `NEXT_PUBLIC_SENTRY_DSN` set; `captureDbError` via Prisma extension\n\n## Edit guardrails\n\n**Safe:** `src/lib/*`, `src/app/api/*`, `prisma/schema.prisma`, `scripts/*`\n\n**Avoid unless requested:**\n\n- `src/components/dashboard/*` layout (flex/grid/sticky/variants)\n- `src/app/home-dashboard.tsx` structure\n- Modal system, `LiveTrendsSidebar` polling interval UX\n- Mass `{ success, data }` migration of all endpoints\n\n## API conventions\n\n- Success payloads keep stable keys (`videos`, `balance`, `trends`, …)\n- New errors may use `{ success: false, error }` via `withApiRoute` / `apiError`\n- ~10 of 34 routes use `withApiRoute`; feed/transcribe/generate use manual handling\n\n\n---\n\n# Known Decisions\n\n> Deliberate choices documented in code, backend docs, or audits. Not a wishlist.\n\n## Product & API\n\n| Decision | Rationale | Source |\n|----------|-----------|--------|\n| Stable JSON keys on success responses | Frontend depends on `videos`, `balance`, `trends`, etc. | `BACKEND_ARCHITECTURE.md` |\n| Initial feed search does not spend tokens | Only `action: \"more\"` calls `spendTokens` | `feed/route.ts` |\n| `force-dynamic` on home page | Fresh SSR payload each visit | `page.tsx` |\n| Dashboard tabs stay mounted (`hidden`) | Preserve scroll/state | `DashboardTabPanel.tsx`, backend guardrails |\n\n## Auth & sessions\n\n| Decision | Rationale | Source |\n|----------|-----------|--------|\n| Dual identity: NextAuth `User` + app `SessionUser` | Tokens/saved data on `SessionUser`; OAuth on `User` | `auth-bridge.ts`, schema |\n| Anonymous users via httpOnly `viral_session_id` | Use product before login | `token-wallet.ts` |\n| `ensureSessionUser()` is API session entry | Single helper for routes | `token-wallet.ts` |\n| Google `allowDangerousEmailAccountLinking: true` | Link Google to existing email account | `auth.ts` |\n\n## Search & ingest\n\n| Decision | Rationale | Source |\n|----------|-----------|--------|\n| 15-minute external search throttle per normalized query | Reduce YouTube/TikHub quota use | `search-throttle.ts` |\n| Throttle marked only after successful ingest (`saved > 0`) | Avoid locking users out on failed API | **2026-05-30 fix**, `feed/route.ts` |\n| Fail-open if throttle **read** fails | DB errors must not block ingest | **2026-05-30 fix**, `search-throttle.ts` |\n| Ingest runs inside feed HTTP request | No background queue yet | Audits, `feed/route.ts` |\n| `loadAndPick` fetches up to 800 rows then filters in memory | Smart-mix over candidate pool | `feed/route.ts` |\n\n## Performance & pool\n\n| Decision | Rationale | Source |\n|----------|-----------|--------|\n| Stagger saved map (12s) and list (18s) on dashboard load | Protect Supabase pool on free tier | `home-dashboard.tsx` |\n| Home count via lazy `/api/videos/home?countOnly=1` | Avoid expensive count on SSR paint | `dashboard-fetch.ts`, `dashboard-home.ts` |\n| No `totalCount` on feed response | Removed full-table count per request | **2026-05-30 fix** |\n| Trends realtime GET is read-only | Heavy discovery in `lazy-refresh` POST | `trends/realtime/route.ts`, backend doc |\n| AdminEvent circuit breaker on pool errors | Logging must not worsen outages | `admin-events.ts` |\n\n## AI\n\n| Decision | Rationale | Source |\n|----------|-----------|--------|\n| Prompts server-only | Security + IP | `script-generator-prompt.ts` |\n| Refund tokens on generate failure after spend | Fair billing | `generate/route.ts` |\n| 60s DeepSeek timeout | Prevent hung requests | `deepseek-generate.ts` |\n\n## Prisma\n\n| Decision | Rationale | Source |\n|----------|-----------|--------|\n| `prisma` = extended wrapper over `getPrismaBase()` | One engine; Sentry on queries | `prisma.ts`, focused audit |\n| Auth adapter uses base client without extension | Adapter compatibility | `prisma-base.ts`, `auth.ts` |\n\n## Intentionally deferred (BACKEND_ARCHITECTURE «Later»)\n\n- Unified `{ success, data }` on all routes\n- Repository layer over Prisma\n- OpenTelemetry / external logging\n- Note: backend doc says «NextAuth not in routes yet» — **stale**; `ensureSessionUser` already calls `auth()`\n","history":"# Change Log\n\n> Engineering changes tracked for this knowledge base. Product changelog is not maintained here.\n\n## 2026-05-30 — External search & feed performance fixes\n\n**Files:** `src/lib/search-throttle.ts`, `src/app/api/videos/feed/route.ts`\n\n### 1. External search throttle timing\n\n- **Before:** `markExternalSearchMade(q)` ran before YouTube/TikHub ingest completed.\n- **After:** Throttle recorded only when `action === \"search\"` **and** `ytSaved + igSaved > 0` after ingest finishes.\n- **Why:** Failed or empty ingest no longer blocks external refill for 15 minutes.\n\n### 2. Fail-open on throttle read errors\n\n- **Before:** `canMakeExternalSearch` returned `false` on DB/`appRuntimeState` read failure.\n- **After:** Returns `true` in `catch` (fail-open); legitimate 15-minute throttle unchanged.\n- **Why:** Pool/DB glitches must not silently disable external search.\n\n### 3. Removed feed `totalCount`\n\n- **Before:** Every `POST /api/videos/feed` ran unfiltered `prisma.video.count()`.\n- **After:** `totalCount` omitted from feed response.\n- **Why:** Full-table count on every search/load-more; home UI already lazy-loads filtered count via `GET /api/videos/home?countOnly=1` (`queryHomeVideoCount` + `HOME_VIDEO_WHERE`).\n- **Client impact:** `SearchResultsSection` only sets stat when field present; home path unchanged.\n\n---\n\n## 2026-05-30 — Documentation\n\n- Added `docs/project-audit-master.md` (CodeGraph complexity + architecture audit).\n- Added `project-docs/` knowledge base (this folder).\n\n---\n\n## 2026-05-30 — Project knowledge base (`project-docs/`)\n\n- Added 8 markdown docs + `dashboard.html` (offline `file://` capable, embeds markdown).\n- Regenerate dashboard after edits: `node project-docs/build-dashboard.mjs`.\n\n---","pricing":"# Viral — Обзор тарифов\n\n> Единый источник правды по коммерческой упаковке. Обновлено: 2026-05-31.\n>\n> **Токены и лимиты** — из `unit-economics.md` v2 (исследование прайсов май 2026). **Биллинг не подключён** (`mock-dashboard-panels.tsx` — демо).\n\n## Что продаём\n\nViral — дашборд на Next.js для блогеров, экспертов, SMM-специалистов и агентств, которые работают с коротким вертикальным видео:\n\n| Возможность | Реализация в коде |\n|-------------|-------------------|\n| Поиск видео (YouTube Shorts + Instagram Reels) | `POST /api/videos/feed` |\n| Отслеживание конкурентов («шпион») | `/api/competitors/*` |\n| Сохранённые ролики | `/api/saved-videos` |\n| Генерация сценариев | DeepSeek через `/api/script-generator/generate` |\n| Транскрибация (для референсов в сценариях) | Groq Whisper через `/api/videos/transcribe` |\n| Живые тренды в сайдбаре | `GET /api/trends/realtime` |\n\n**Не входит в продукт:** Content Radar (исключён из всех тарифов). Полноценный AI-разбор ролика в `VideoDetailPanel` — **только демо-интерфейс**, платного бэкенда пока нет.\n\n---\n\n## Каталог тарифов\n\n| Тариф | В месяц | В год (2 месяца в подарок) | Оплата |\n|-------|---------|----------------------------|--------|\n| **Free Preview** | 0 ₽ | — | Без карты |\n| **Trial** | 0 ₽ на 3 дня | — | Карта → Creator |\n| **Creator** | **2 990 ₽** | **29 900 ₽** | Подписка |\n| **Producer** | **6 990 ₽** | **69 900 ₽** | Подписка |\n| **Visioner** | **14 990 ₽** | **149 900 ₽** | Подписка |\n\n*Годовой тариф = оплата за 10 месяцев, польза 12 (~17% скидка). **Предложено** до подключения платёжки (YooKassa / Stripe).*\n\n---\n\n## Детали по тарифам\n\n### Free Preview\n\n| Параметр | Значение |\n|----------|----------|\n| **Цена** | 0 ₽ |\n| **Целевая аудитория** | Блогер на этапе «присмотреться»; начинающий эксперт; студент |\n| **Токены** | **60** разово | COGS ~45 ₽; хватит на 1 сценарий + пробу «ещё ролики» |\n| **Что включено** | Лента из кэша БД, тренды (чтение), до **3** сохранений |\n| **Лимиты** | **Без external ingest**; 0 конкурентов; без транскрибации |\n| **Зачем такие лимиты** | Защита расходов TikHub/YouTube; апгрейд до привычного использования; лента из БД всё равно показывает ценность |\n| **Триггеры апгрейда** | Блок «Ещё ролики»; исчерпан лимит сценариев; нужен шпион; нужна свежая выдача Instagram/YouTube |\n\n### Trial (3 дня, карта обязательна)\n\n| Параметр | Значение |\n|----------|----------|\n| **Цена** | 0 ₽ на 72 часа, далее Creator, если не отменили |\n| **Целевая аудитория** | Эксперт или SMM, готовый прогнать полный рабочий цикл до оплаты |\n| **Токены** | **450** на 3 дня (~25% месячного Creator) |\n| **Что включено** | Полный набор Creator на 3 дня |\n| **Лимиты** | Как у Creator; жёсткая остановка по окончании триала или при нулевом балансе |\n| **Зачем такие лимиты** | Хватает на 3–5 рабочих сессий (поиск + сценарии + 1–2 конкурента); карта снижает злоупотребления |\n| **Триггеры апгрейда** | Баннер «триал заканчивается»; баланс &lt; 50 токенов; привычка к ежедневному sync конкурентов |\n\n### Creator — 2 990 ₽ / месяц\n\n| Параметр | Значение |\n|----------|----------|\n| **Цена** | 2 990 ₽ / мес · 29 900 ₽ / год |\n| **Целевая аудитория** | Блогер, эксперт, фриланс-SMM; 4–12 Reels/Shorts в месяц |\n| **Токены** | **1 800 / месяц** (сгорают) |\n| **Что включено** | Поиск + внешний ingest, тренды, библиотека сохранений, генератор сценариев, транскрибация, шпион |\n| **Лимиты** | **5** профилей конкурентов (в коде `MAX_COMPETITORS_PER_USER = 10` — коммерческий потолок **предложено**); **200** сохранённых роликов; throttle внешнего поиска 15 мин/запрос (из кода) |\n| **Зачем такие лимиты** | 1 800 tok ≈ 15 сценариев + 25 load-more + лёгкий шпион (см. unit-economics v2) |\n| **Триггеры апгрейда** | &gt;5 конкурентов; несколько клиентов; &gt;20 сценариев в неделю |\n\n### Producer — 6 990 ₽ / месяц\n\n| Параметр | Значение |\n|----------|----------|\n| **Цена** | 6 990 ₽ / мес · 69 900 ₽ / год |\n| **Целевая аудитория** | SMM на 2–4 клиента, продюсер с несколькими нишами |\n| **Токены** | **5 500 / месяц** |\n| **Лимиты** | **10** конкурентов; **500** saves |\n| **Почему 5 500** | COGS ~420 ₽ → маржа ~94%; мост между Creator и Visioner |\n| **Триггеры апгрейда** | &gt;10 конкурентов; команда; &gt;50 сценариев/мес |\n\n### Visioner — 14 990 ₽ / месяц\n\n| Параметр | Значение |\n|----------|----------|\n| **Цена** | 14 990 ₽ / мес · 149 900 ₽ / год |\n| **Целевая аудитория** | Агентство, продюсер, контент-команда, бизнес с несколькими нишами |\n| **Токены** | **12 000 / месяц** |\n| **Лимиты** | **15** конкурентов; **2 000** saves |\n| **Почему 12 000** | COGS агентства ~1 550 ₽ → маржа ~90%; 25k избыточно |\n| **Триггеры апгрейда** | SSO, API, white-label — enterprise-продажи |\n\n---\n\n## Сравнительная матрица функций\n\n| Функция | Free | Trial | Creator | Producer | Visioner |\n|---------|:----:|:-----:|:-------:|:--------:|:--------:|\n| Лента (кэш БД) | ✅ | ✅ | ✅ | ✅ | ✅ |\n| External ingest | ❌ | ✅ | ✅ | ✅ | ✅ |\n| «Ещё ролики» | ❌ | ✅ | ✅ | ✅ | ✅ |\n| Тренды | ✅ | ✅ | ✅ | ✅ | ✅ |\n| Saves | 3 | 150 | 150 | 500 | 2 000 |\n| Сценарии | ❌ | ✅ | ✅ | ✅ | ✅ |\n| Конкуренты | 0 | 5 | 5 | 10 | 15 |\n| **Токены** | 60 | 450/3д | **1 800** | **5 500** | **12 000** |\n\n---\n\n## Списания токенов: код vs коммерция (v2)\n\n| Действие | Код | Коммерция v2 | COGS ≈ |\n|----------|----:|-------------:|-------:|\n| Первый поиск | 0 | 0 | 0–0,25 ₽ |\n| «Ещё ролики» | 5 | **8** | 0,15–0,40 ₽ |\n| Сценарий | 20 | **25** | ~0,20 ₽ |\n| Транскрибация | 5 | **6** | ~0,05 ₽ |\n| Add / refresh конкурента | 30 | **35** | ~0,30 ₽ |\n| Daily sync | 5 | **6** | ~0,10 ₽ |\n\nНовые пользователи сейчас получают **12 400** токенов (`DEFAULT_BALANCE` в `token-wallet.ts`) — это **dev/demo**, не коммерческий план.\n\n---\n\n## Позиционирование на рынке\n\n*Конкуренты — для **ценового контекста**, не для сравнения функций один к одному. Viral заточен под исследование Shorts/Reels + сценарии + шпион в РФ/СНГ.*\n\n### vs инструменты класса LightReel ($199/мес, ~16 900 ₽)\n\n| Параметр | LightReel (публично) | Viral Creator | Viral Visioner |\n|----------|---------------------|---------------|----------------|\n| Входная цена | ~$199/мес (~16 900 ₽) | 2 990 ₽ (~$35) | 14 990 ₽ (~$176) |\n| Триал | 3 дня бесплатно | 3 дня + карта | — |\n| Позиционирование | UGC-исследование, хуки, AI-агент | Поиск + шпион + сценарии для РФ/СНГ | Масштаб агентства |\n| Лимиты поиска | ~400–1 000 запросов/мес (обзоры) | Ingest через токены | Большой пул токенов |\n\n**Где Viral сильнее:** в 6–10 раз ниже вход для рынка РФ/СНГ; шпион и сценарии в одном продукте; Instagram через TikHub в одном окне.\n\n**Где слабее:** меньше «библиотеки UGC» в маркетинге; нет шаринга ссылок в команде; узнаваемость ниже западных брендов.\n\n**Цена:** Creator на порядок дешевле — ок, если API-расходы держит токеномика.\n\n### vs тариф «Creator+» ($25–35/мес, ~2 100–3 000 ₽)\n\nПример: AIReel Pro ~$25/мес (~2 100 ₽) — другая категория (генерация видео), но похожая психология «кредитов».\n\n| Параметр | Типичный Creator+ | Viral Creator |\n|----------|-------------------|---------------|\n| Цена | $25–35/мес (~2 100–3 000 ₽) | 2 990 ₽ (~$35) |\n| Ценность | Кредиты на генерацию | Исследование + шпион + сценарии |\n| Перерасход | Пакеты кредитов | Пакеты токенов **предложено** |\n\n**Где Viral сильнее:** цикл «нашёл → сохранил → написал сценарий», а не только генерация.\n\n**Где слабее:** нет рендера видео — монтаж и съёмка снаружи.\n\n**Цена:** 2 990 ₽ — на уровне global Creator-SaaS; для удержания в РФ нужна годовая скидка.\n\n### vs агентский сегмент ($99–199/мес, ~8 400–16 900 ₽)\n\n| Параметр | Агентские research-инструменты | Viral Visioner |\n|----------|----------------------------------|----------------|\n| Цена | $99–199+/мес (~8 400–16 900 ₽) | 14 990 ₽ (~$176) |\n| Места | Часто 3–5 | 1 (команда — в планах) |\n| Объём | Токены + лимиты | 12 000 токенов — жёсткий потолок |\n\n**Где Viral сильнее:** заточен под Shorts/Reels + шпион + сценарии; дешевле позиционирования LightReel для агентств.\n\n**Где слабее:** нет RBAC на несколько мест, SSO, SLA.\n\n**Цена:** 14 990 ₽ оправдана как «рабочий стол агентства», а не безлимитный AI.\n\n---\n\n## Итоговые рекомендации (v2)\n\n> Полный пересчёт: `unit-economics.md` v2. Старая модель (4k/25k tok, маржа 45–70%) **заменена**.\n\n### Если запускать оплату завтра\n\n| Решение | Рекомендация |\n|---------|--------------|\n| **Тарифы** | Creator **2 990 ₽** + Visioner **14 990 ₽**; Producer **6 990 ₽** при demand |\n| **Токены** | Free **60** · Trial **450** · Creator **1 800** · Producer **5 500** · Visioner **12 000** |\n| **Trial** | Да, 3 дня + карта |\n| **Free** | Да, без external ingest |\n\n### Рекомендуемые лимиты\n\n| Лимит | Creator | Producer | Visioner |\n|-------|---------|----------|----------|\n| Токены / мес | 1 800 | 5 500 | 12 000 |\n| Конкуренты | 5 | 10 | 15 |\n| Сохранённые ролики | 150 | 500 | 2 000 |\n\n### Маржинальность (v2)\n\n| Этап | Платящих | MRR | Валовая маржа |\n|------|----------|-----|:-------------:|\n| Старт | 50 | ~240k | **~93%** |\n| Traction | 250 | ~1,2M | **~95%** |\n| Масштаб | 1 000 | ~4,8M | **~95%** |\n\n*Микс 70/15/15 Creator/Producer/Visioner.*\n\n### Главные риски\n\n1. **Sync ingest на Vercel** — главный COGS-риск\n2. **Creator abuse** — маржа до 20% без rate limits\n3. **Демо-баланс 12 400**\n4. **Trends poll off-tab**\n\n### Главные возможности\n\n1. TikHub **$0,001–0,002**/call — дешевле старых допущений\n2. DeepSeek **~0,20 ₽**/сценарий\n3. Producer tier для SMM без Visioner\n\n---\n\n## Как обновлять документ\n\n| Что менять | Файл |\n|------------|------|\n| Цены / лимиты тарифов | `pricing-overview.md` |\n| COGS API / веса токенов | `feature-costs.md` |\n| Сценарии по масштабу | `unit-economics.md` |\n| Воронка | `user-growth-model.md` |\n| Этапы роста | `pricing-roadmap.md` |\n\nПересборка дэшборда: `node project-docs/build-dashboard.mjs`\n","economics":"# Юнит-экономика v2 — исследование и пересчёт\n\n> Пересборка с нуля на основе прайсов поставщиков (май 2026) и карты действий из кода.  \n> **Заменяет** модель от 2026-05-30 (таблицы с маржой 88–90% **завышали** прибыльность — см. § «Расхождения»).  \n> Курс для пересчёта: **95 ₽ / USD**. Источники — в §1.\n\n---\n\n## 1. Исследование: реальные цены поставщиков\n\n### 1.1 TikHub\n\n**Модель:** pay-as-you-go, без абонплаты; списание только при HTTP 200.  \n**Скидки:** 0% до 1 000 req/день → до **50%** при 30 000+ req/день ([docs](https://docs.tikhub.io/4592751m0)).  \n**Бесплатно:** ~50 запросов на тест ([tikhub.io/pricing](https://tikhub.io/pricing)).\n\n| Endpoint (используется в Viral) | Файл | Цена / запрос | Источник |\n|--------------------------------|------|--------------:|----------|\n| `GET …/instagram/v2/search_reels` | `tikhubInstagram.ts` | **$0,002** | [docs](https://docs.tikhub.io/387337819e0) |\n| `GET …/instagram/v2/fetch_user_reels` | `tikhubInstagram.ts` | **~$0,001–0,002** (база $0,001; v2 — уточнить в кабинете) | [docs v1 reels](https://docs.tikhub.io/387337788e0), [pricing intro](https://docs.tikhub.io/4592751m0) |\n| `GET …/instagram/v3/get_post_info_by_code` | транскрибация / refresh | **~$0,001** (базовый тариф) | [pricing intro](https://docs.tikhub.io/4592751m0) |\n| `GET …/instagram/v2/fetch_post_info` | fallback поста | **~$0,001** | idem |\n\n**Как Viral тратит TikHub (из кода):**\n\n| Действие пользователя | Вызовов TikHub | COGS (без скидки) |\n|----------------------|---------------:|------------------:|\n| Ingest IG при поиске | 1× search_reels | **$0,002** (~0,19 ₽) |\n| Добавить IG-конкурента | до 3× fetch_user_reels (+ retry) | **$0,003–0,006** |\n| Refresh Reels конкурента | до 3× fetch_user_reels | **$0,003–0,006** |\n| Daily sync IG-конкурента | 1× fetch_user_reels / профиль / день | **~$0,001** |\n| Транскрибация IG (нет субтитров) | 1–2× post info | **$0,001–0,002** |\n\n**Какой тариф TikHub нужен Viral:** отдельный план не требуется — **pay-as-you-go + пополнение баланса**. При 500–2 000 req/день скидка 10–20% realistic. Enterprise ($3 000+) — только при &gt;30k req/день.\n\n---\n\n### 1.2 DeepSeek (`deepseek-v4-flash`, код: `deepseek-generate.ts`)\n\nОфициальные цены ([api-docs.deepseek.com](https://api-docs.deepseek.com/quick_start/pricing)):\n\n| Бакет | $ / 1M токенов |\n|-------|---------------:|\n| Input cache miss | $0,14 |\n| Input cache hit | $0,0028 |\n| Output | $0,28 |\n\nПараметры в коде: `max_tokens: 1800`, `temperature: 0.55`, **полная история чата** каждый вызов.\n\n| Сценарий | Input tok | Output tok | COGS USD | COGS ₽ |\n|----------|----------:|-----------:|---------:|-------:|\n| Короткий (1-й сценарий, мало истории) | ~4 000 | ~800 | **~$0,0008** | **~0,08 ₽** |\n| Типичный (профиль + 2 референса + 4 сообщения) | ~12 000 | ~1 400 | **~$0,0021** | **~0,20 ₽** |\n| Длинный (10+ сообщений в чате) | ~35 000 | ~1 800 | **~$0,0054** | **~0,51 ₽** |\n\n*Cache hit для system prompt снижает input на ~30–50% — в расчётах не заложено (оптимизм).*\n\n---\n\n### 1.3 Groq Whisper (`whisper-large-v3-turbo`, код: `transcription-config.ts`)\n\n| Метрика | Значение | Источник |\n|---------|----------|----------|\n| Цена | **$0,04 / час** аудио | [groq.com/pricing](https://groq.com/pricing) |\n| Минимум | 10 сек / запрос | idem |\n| Модель по умолчанию | `whisper-large-v3-turbo` | `transcription-config.ts` |\n\n| Объём | Длительность | COGS USD | COGS ₽ |\n|------:|-------------|---------:|-------:|\n| 1 ролик | 45 с | $0,0005 | **~0,05 ₽** |\n| 10 роликов | 45 с каждый | $0,005 | **~0,48 ₽** |\n| 100 роликов | 45 с каждый | $0,05 | **~4,75 ₽** |\n\n*Если есть субтитры в метаданных — Groq **не вызывается** (COGS = 0).*\n\n---\n\n### 1.4 YouTube Data API (код: `ingest-youtube.ts`)\n\n| Операция | Units | При ingest |\n|----------|------:|-----------|\n| `search.list` | 100 | 1× |\n| `videos.list` | 1 | 1× |\n| **Итого ingest YT** | **~101** | на новый запрос с внешним поиском |\n\nБесплатная квота: **10 000 units/день** ([Google](https://developers.google.com/youtube/v3/determine_quota_cost)).  \nПри 50 ingest/день ≈ 5 050 units — **вписываемся в free tier** до ~99 ingest/день.\n\n---\n\n### 1.5 Vercel Pro ([docs](https://vercel.com/docs/functions/usage-and-pricing))\n\n| Метр | Тариф |\n|------|-------|\n| Seat | $20/мес + **$20 usage credit** |\n| Active CPU | $0,128 / CPU-hour |\n| Provisioned Memory | $0,0106 / GB-hour |\n| Invocations | $0,60 / 1M |\n\n**Драйверы в Viral:**\n\n| Паттерн | Длительность / частота | Нагрузка |\n|---------|------------------------|----------|\n| `POST /api/videos/feed` + sync ingest | **5–20 с** wall time, CPU активен на I/O | **Высокая** |\n| `POST …/script-generator/generate` | до 60 с | Средняя |\n| `GET /api/trends/realtime` | poll **120 с** (`LiveTrendsSidebar`) | Средняя на MAU (фон) |\n| Saved / session / SSR | &lt;500 ms | Низкая |\n\n**Оценка Vercel / мес (только compute, iad1):**\n\n| MAU (активных) | Invocations | GB-hours (оценка) | CPU-hours (оценка) | **Итого USD** | **₽** |\n|---------------:|------------:|------------------:|-------------------:|--------------:|------:|\n| 100 | ~400k | ~80 | ~8 | **~$25–35** | **~2 400–3 300** |\n| 500 | ~2M | ~350 | ~35 | **~$90–130** | **~8 500–12 400** |\n| 1 000 | ~4M | ~650 | ~65 | **~$160–240** | **~15 200–22 800** |\n| 5 000 | ~18M | ~2 800 | ~280 | **~$650–950** | **~62 000–90 000** |\n\n*Credit $20/seat покрывает только ранний этап. Sync ingest — главный риск Vercel, не TikHub.*\n\n---\n\n### 1.6 Supabase Pro ([supabase.com/pricing](https://supabase.com/pricing))\n\n| Масштаб | План | Compute | **₽ / мес** |\n|---------|------|---------|------------:|\n| Старт (&lt;200 MAU) | Pro | Micro (включён $10 credit) | **~2 400** ($25) |\n| 500 MAU | Pro | **Small** recommended | **~3 800** ($25 + $15 compute) |\n| 1 000 MAU | Pro | **Medium** | **~7 100** ($25 + $60) |\n| 5 000 MAU | Pro | **Large** | **~12 800** ($25 + $110) |\n\nPooler (port 6543): до **200** conn на Micro — при росте feed-нагрузки нужен Small+.  \nStorage/bandwidth на раннем этапе **внутри лимитов** Pro (8 GB DB, 250 GB egress).\n\n---\n\n## 2. Карта действий пользователя (из кода)\n\n| Действие | Токены (код) | COGS API | COGS infra | Класс |\n|----------|-------------:|----------|------------|-------|\n| Первый поиск / лента | 0 | YT+TikHub **если ingest** | DB + **долгий HTTP** | 🟡→🔴 при ingest |\n| «Ещё ролики» | 5 | как поиск при thin pool | DB + HTTP | 🟡→🔴 |\n| Throttle 15 мин / query | — | кэш-поведение | `appRuntimeState` | 🟢 |\n| Повторный поиск (throttled) | 0 | **0** внешний | DB only | 🟢 |\n| Сохранить ролик | 0 | 0 | Postgres write | 🟢 |\n| Открыть карточку / saved state | 0 | 0 | read | 🟢 |\n| Тренды poll (120 с) | 0 | 0 | invocations + DB | 🟡 |\n| Lazy refresh trends | 0 | возможен YT/TikHub | тяжёлый POST | 🔴 |\n| Генерация сценария | 20 | DeepSeek | HTTP 60s | 🟡 |\n| Транскрибация | 5 | Groq или 0 | HTTP | 🟢–🟡 |\n| Добавить IG-конкурента | 30 | 3–6× TikHub | sync HTTP | 🔴 |\n| Refresh Reels | 30 | 3–6× TikHub | sync HTTP | 🔴 |\n| Daily sync / конкурент | 5 | 1× TikHub или YT | batch | 🟡 |\n\n**Критически дорогие:** sync ingest в feed, competitor add/refresh, lazy trends refresh.  \n**Бесплатные для нас (пока):** browse DB, saves, throttled re-search.  \n**Скрытый налог:** trends poll **вне вкладки Home** (аудит) — лишние invocations.\n\n---\n\n## 3. Пользовательские сценарии (COGS / мес)\n\n| Профиль | Действия / мес | COGS API ₽ | COGS infra ₽ | **COGS итого** | Выручка | **Маржа** |\n|---------|----------------|----------:|-------------:|---------------:|--------:|----------:|\n| 1. Любопытный | лента DB, 20× trends poll | ~5 | ~40 | **~45** | 0 | — |\n| 2. Начинающий блогер | 8 search (3 ingest), 6 load-more, 4 script, 2 transcribe | ~15 | ~80 | **~95** | 0 / trial | — |\n| 3. Активный блогер | 25 ingest search, 30 load-more, 12 script, 8 transcribe, 3×15 sync | ~55 | ~180 | **~235** | 2 990 | **92%** |\n| 4. SMM (3 клиента) | 40 ingest, 50 load-more, 20 script, 8 sync×3 конк. | ~120 | ~320 | **~440** | 2 990 | **85%** |\n| 5. Продюсер | 60 ingest, 80 load-more, 25 script, 8 конк.×20 sync, 6 refresh | ~280 | ~450 | **~730** | 2 990 | **76%** |\n| 6. Агентство | 100 ingest, 150 load-more, 45 script, 12×22 sync, 15 refresh | ~650 | ~900 | **~1 550** | 14 990 | **90%** |\n\n*Infra = аллокация Vercel+Supabase на пользователя при указанном MAU.*\n\n**Вывод:** при **2 990 ₽** маржа падает ниже 80% у **продюсера** на одном аккаунте — нужны лимиты конкурентов/sync, не только токены.\n\n---\n\n## 4. Worst-case analysis (один платящий / мес)\n\n| Тип | Поведение | COGS ₽ | Выручка ₽ | Валовая прибыль | Маржа |\n|-----|-----------|-------:|----------:|----------------:|------:|\n| Минимальный | 2 script, DB browse | ~30 | 2 990 | 2 960 | 99% |\n| Средний | профиль «активный блогер» | ~235 | 2 990 | 2 755 | 92% |\n| Максимальный (честный) | профиль «продюсер» | ~730 | 2 990 | 2 260 | 76% |\n| Злоупотребление | 500 load-more + ingest, 100 script, 15×30 sync | **~2 400** | 2 990 | **590** | **20%** |\n| Злоупотребление Visioner | то же на 14 990 | ~2 400 | 14 990 | 12 590 | 84% |\n| Агентство (норма) | 12 конкурентов, команда 3 чел. | ~1 550 | 14 990 | 13 440 | 90% |\n\n**Visioner выгоден при злоупотреблении** — цена ×5, COGS ×3,3. **Creator опасен** без rate limits.\n\n---\n\n## 5. Рекомендуемые тарифы (новая модель — не 150/1000/4000/25000)\n\nЦены **2 990 / 14 990 ₽** сохраняем (рынок РФ). **Токены и лимиты — новые**, из COGS.\n\n| Тариф | Цена | Токены / период | Лимиты | Почему |\n|-------|------|----------------:|--------|--------|\n| **Free Preview** | 0 ₽ | **60** разово | DB-лента, 3 saves, 0 конкурентов, 0 ingest | COGS ~45 ₽; 60 tok ≈ 1 script + 2 load-more для «вау» |\n| **Trial** | 0 ₽ · 3 дня + карта | **450** | полный Creator | ~1/5 месячного пула; хватает на 1 рабочую неделю сценария |\n| **Creator** | 2 990 ₽/мес | **1 800 / мес** | 5 конкурентов, 150 saves, ingest on | Покрывает профиль «активный блогер» (~930 tok) + запас; COGS ~235 ₽ → маржа ~92% |\n| **Producer** *(новый)* | **6 990 ₽/мес** | **5 500 / мес** | 10 конкурентов, 500 saves | Для SMM/продюсера (~2 500 tok); COGS ~730 ₽ → маржа ~89% |\n| **Visioner** | 14 990 ₽/мес | **12 000 / мес** | 15 конкурентов, 2 000 saves | Агентство ~4 000 tok; COGS ~1 550 ₽ → маржа ~90%; ниже 25k — меньше arbitrage |\n\n**Веса токенов (коммерция, ≠ только код):**\n\n| Действие | Новый вес | Было в коде |\n|----------|----------:|------------:|\n| Поиск (1-я страница) | 0 | 0 |\n| «Ещё ролики» | **8** | 5 |\n| Сценарий | **25** | 20 |\n| Транскрибация | **6** | 5 |\n| Daily sync | **6** | 5 |\n| Add / refresh конкурента | **35** | 30 |\n\n---\n\n## 6. Масштаб: выручка и затраты (реалистичный микс)\n\nМикс платящих: 70% Creator / 15% Producer / 15% Visioner → **ARPU ≈ 4 780 ₽**.\n\n| Платящих | MRR ₽ | API ₽ | Vercel ₽ | Supabase ₽ | **Затраты ₽** | **Валовая прибыль** | **Маржа** |\n|--------:|------:|------:|---------:|-----------:|--------------:|--------------------:|----------:|\n| 10 | 47 800 | 1 800 | 2 800 | 2 400 | **7 000** | 40 800 | **85%** |\n| 50 | 239 000 | 7 500 | 6 500 | 2 400 | **16 400** | 222 600 | **93%** |\n| 100 | 478 000 | 16 000 | 12 000 | 3 800 | **31 800** | 446 200 | **93%** |\n| 500 | 2 390 000 | 72 000 | 45 000 | 7 100 | **124 100** | 2 265 900 | **95%** |\n| 1 000 | 4 780 000 | 145 000 | 85 000 | 12 000 | **242 000** | 4 538 000 | **95%** |\n| 5 000 | 23 900 000 | 620 000 | 380 000 | 45 000 | **1 045 000** | 22 855 000 | **96%** |\n\n*API = TikHub + DeepSeek + Groq + YT overages. Не включает ЗП.*\n\n**Break-even (с ЗП):** solo ~**15–20** платящих; 1 FTE 200k ₽ ~**55–65**; команда ~**280–320**.\n\n---\n\n## 7. Расхождения со старой моделью (2026-05-30)\n\n| Утверждение старой модели | Факт v2 |\n|---------------------------|---------|\n| Маржа 89% @ 100 paid | **93%** при реальных API-ценах, **но** 76% у тяжёлого Creator без лимитов |\n| TikHub «главная неизвестность» | **Цены известны** ($0,001–0,002); риск = **объём + sync ingest на Vercel** |\n| 4 000 / 25 000 токенов | **Завышены**; достаточно **1 800 / 12 000** при новых весах |\n| API $3,50/user | Реально **~$1,2–2,5** / платящий при умеренном use |\n| Break-even 8–12 paid | **15–20** с учётом Vercel Pro + Supabase fixed |\n\n---\n\n## 8. Если запускать оплату завтра\n\n| Решение | Рекомендация |\n|---------|--------------|\n| **Тарифы** | Creator **2 990 ₽** + Visioner **14 990 ₽**; добавить **Producer 6 990 ₽** в первые 60 дней если &gt;20% юзеров упираются в лимит конкурентов |\n| **Токены** | Free **60** · Trial **450** · Creator **1 800/мес** · Producer **5 500** · Visioner **12 000** |\n| **Trial** | **Да**, 3 дня + карта → Creator; **450 токенов** |\n| **Free** | **Да**, но **без external ingest** — иначе ~0,19 ₽ × каждый любопытный |\n| **Средний тариф** | **Producer через 100 paid**, если данные подтвердят |\n| **Опасные лимиты** | ① sync ingest ② daily sync × N конкурентов ③ demo 12 400 tok ④ trends poll off-tab |\n| **P0 инженерия** | Async ingest queue; rate limit feed/generate; billing gates; лог `usage` DeepSeek |\n\n**Главный вывод:** продукт **можно монетизировать** на текущих ценах, но **старые пулы токенов (4k/25k) и маржа 88% без opex — неверны**. Реальная угроза — не TikHub $/call, а **Vercel + злоупотребление Creator**.\n\n---\n\n## Источники\n\n- TikHub: https://docs.tikhub.io/4592751m0 · https://docs.tikhub.io/387337819e0 · https://tikhub.io/pricing  \n- DeepSeek: https://api-docs.deepseek.com/quick_start/pricing  \n- Groq: https://groq.com/pricing  \n- Vercel: https://vercel.com/docs/functions/usage-and-pricing  \n- Supabase: https://supabase.com/pricing  \n- YouTube quota: https://developers.google.com/youtube/v3/determine_quota_cost  \n- Код Viral: `tikhubInstagram.ts`, `feed/route.ts`, `deepseek-generate.ts`, `LiveTrendsSidebar.tsx`, `competitor-instagram-reels-sync.ts`\n","problems":"# Проблемы и план (кратко)\n\n## Executive verdict (2026-05-30)\n\n**Solid early-production codebase** with strong operational patterns (pool protection, admin circuit breaker, client SWR cache, token refunds) and structural debt (fat routes, UI monoliths, sync ingest in HTTP).\n\n| Dimension | Score (1–5) |\n|-----------|-------------|\n| Product | 4 |\n| Architecture | 3 |\n| Maintainability | 2.5 |\n| Scalability | 2 |\n| User Experience | 3.5 |\n\n## Focused audit — issues & status\n\n| Issue | Severity | Status |\n|-------|----------|--------|\n| `markExternalSearchMade` before ingest | Medium | **Fixed** 2026-05-30 |\n| `canMakeExternalSearch` fail-closed on DB error | Medium | **Fixed** 2026-05-30 |\n| Unfiltered `video.count()` on every feed POST | Medium | **Fixed** 2026-05-30 |\n| Sync ingest in feed request (latency) | Medium–High | Open |\n| Trends poll continues off Home tab (desktop sidebar) | Low–Medium | Open |\n| ~70% routes without `withApiRoute` | Low–Medium | Open |\n| `mockWeeklyTrends` on home | Low | Open |\n\n## Roadmap — следующие 30 дней (P0–P1)\n\n## Next 30 days (from audit — adjusted)\n\n| # | Item | Priority | Notes |\n|---|------|----------|-------|\n| 1 | Extract feed orchestration to `lib/feed/*` | P0 | Keep JSON contract stable |\n| 2 | Rate limits on feed, lazy-refresh, generate | P0 | Pool + abuse protection |\n| 3 | Minimal job queue for ingest / lazy-refresh | P0 | Remove sync work from HTTP |\n| 4 | Split `ScriptGeneratorSection` + dynamic import scripts tab | P0 | Reduce bundle / regression radius |\n| 5 | Cap script chat history sent to DeepSeek | P1 | Cost + latency |\n| 6 | Prisma/Supabase pool runbook in docs | P1 | P2024, feed p95 |\n| 7 | Remove or replace `mockWeeklyTrends` | P1 | Home tab credibility |\n| 8 | `withApiRoute` on feed, transcribe, generate | P1 | One route per week + smoke test |\n| 9 | Consolidate saved map + list client fetches | P1 | Fewer duplicate calls |\n| 10 | Document `DashboardTabPanel` mount policy; audit `active` guards | P1 | Background request waste |\n\n## Мониторить в проде\n\n## Monitor in production\n\n- P2024 / Supabase pool timeouts\n- p95 `POST /api/videos/feed` with vs without ingest\n- AdminEvent circuit breaker activations (60s DB audit gap)\n- External ingest `saved: 0` rate in logs\n\n---\n\n# Audits\n\n> Summary of CodeGraph audits and focused reviews. Full detail: `docs/project-audit-master.md`.\n\n## Audit history\n\n| Date | Type | Index / scope |\n|------|------|----------------|\n| 2026-05-30 | Complexity audit | 159 files, top-20 complex files by deps/fan-in/fan-out/state |\n| 2026-05-30 | Architecture audit | Dashboard, auth, cache, Prisma, script generator, scaling |\n| 2026-05-30 | Focused technical audit | External search, feed latency, trends polling |\n| 2026-05-30 | Engineering fixes | Throttle timing, fail-open read, feed `totalCount` removed |\n\n## Executive verdict (2026-05-30)\n\n**Solid early-production codebase** with strong operational patterns (pool protection, admin circuit breaker, client SWR cache, token refunds) and structural debt (fat routes, UI monoliths, sync ingest in HTTP).\n\n| Dimension | Score (1–5) |\n|-----------|-------------|\n| Product | 4 |\n| Architecture | 3 |\n| Maintainability | 2.5 |\n| Scalability | 2 |\n| User Experience | 3.5 |\n\n## Highest-complexity files (regression hotspots)\n\n| File | Why |\n|------|-----|\n| `src/app/api/videos/feed/route.ts` | Core search orchestration |\n| `src/lib/token-wallet.ts` | Billing + session hub |\n| `src/lib/admin-events.ts` | Observability hub (fan-in 26) |\n| `ScriptGeneratorSection.tsx` | ~1k lines UI monolith |\n| `CompetitorSpySection.tsx` | ~1k lines UI monolith |\n\n## Focused audit — issues & status\n\n| Issue | Severity | Status |\n|-------|----------|--------|\n| `markExternalSearchMade` before ingest | Medium | **Fixed** 2026-05-30 |\n| `canMakeExternalSearch` fail-closed on DB error | Medium | **Fixed** 2026-05-30 |\n| Unfiltered `video.count()` on every feed POST | Medium | **Fixed** 2026-05-30 |\n| Sync ingest in feed request (latency) | Medium–High | Open |\n| Trends poll continues off Home tab (desktop sidebar) | Low–Medium | Open |\n| ~70% routes without `withApiRoute` | Low–Medium | Open |\n| `mockWeeklyTrends` on home | Low | Open |\n\n## Prisma dual-client clarification\n\nAudits initially flagged «two pools». **Focused review:** runtime app uses one `getPrismaBase()` instance; `prisma` is `$extends` wrapper — not a second pool. Pool pressure comes from query volume (feed, AdminEvent writes), not duplicate clients.\n\n## Monitor in production\n\n- P2024 / Supabase pool timeouts\n- p95 `POST /api/videos/feed` with vs without ingest\n- AdminEvent circuit breaker activations (60s DB audit gap)\n- External ingest `saved: 0` rate in logs\n\n## Canonical full report\n\nSee **`docs/project-audit-master.md`** for architecture review, technical debt table, scaling notes, top-20 improvements, and 30-day plan.\n\n\n---\n\n# Roadmap\n\n> From `docs/project-audit-master.md` and post-audit fix status. Not a commitment schedule.\n\n## Completed (2026-05-30)\n\n- [x] External search throttle after successful ingest only\n- [x] Fail-open `canMakeExternalSearch` on DB read errors\n- [x] Remove wasteful `prisma.video.count()` from feed response\n\n## Next 30 days (from audit — adjusted)\n\n| # | Item | Priority | Notes |\n|---|------|----------|-------|\n| 1 | Extract feed orchestration to `lib/feed/*` | P0 | Keep JSON contract stable |\n| 2 | Rate limits on feed, lazy-refresh, generate | P0 | Pool + abuse protection |\n| 3 | Minimal job queue for ingest / lazy-refresh | P0 | Remove sync work from HTTP |\n| 4 | Split `ScriptGeneratorSection` + dynamic import scripts tab | P0 | Reduce bundle / regression radius |\n| 5 | Cap script chat history sent to DeepSeek | P1 | Cost + latency |\n| 6 | Prisma/Supabase pool runbook in docs | P1 | P2024, feed p95 |\n| 7 | Remove or replace `mockWeeklyTrends` | P1 | Home tab credibility |\n| 8 | `withApiRoute` on feed, transcribe, generate | P1 | One route per week + smoke test |\n| 9 | Consolidate saved map + list client fetches | P1 | Fewer duplicate calls |\n| 10 | Document `DashboardTabPanel` mount policy; audit `active` guards | P1 | Background request waste |\n\n## Backlog (Important / Later)\n\n**Important (P1):** Split `CompetitorSpySection`; bounded cleanup for `appRuntimeState` keys; `maxDuration` on generate route.\n\n**Later (P2+):** Unified API error shape migration; repository layer; ISR for static shell; HTTP cache headers on GET APIs; DeepSeek streaming; OpenTelemetry.\n\n## Explicitly not planned here\n\nItems listed under «Later (not now)» in `docs/BACKEND_ARCHITECTURE.md` remain deferred unless product asks.\n\n## How to update this file\n\n1. Move completed items to **Completed** with date.\n2. Add new items only when decided — link to `02-change-log.md` for shipped work.\n3. Do not duplicate full audit prose — point to `06-audits.md`.\n","ai":"# AI Prompts & Boundaries\n\n> Script generation only. Do not paste secrets here.\n\n## Stack\n\n| Piece | Location |\n|-------|----------|\n| HTTP to DeepSeek | `src/lib/deepseek-generate.ts` |\n| Prompt assembly | `src/lib/script-generator-prompt.ts` (`server-only`) |\n| Generate route | `src/app/api/script-generator/generate/route.ts` |\n| Shared client strings | `src/lib/script-shared-constants.ts` only |\n| Token cost | `SCRIPT_GENERATION_TOKEN_COST` env (default 20 in `.env.example`) |\n\n## Environment\n\n```env\nDEEPSEEK_API_KEY=\nDEEPSEEK_BASE_URL=https://api.deepseek.com\nDEEPSEEK_MODEL=deepseek-v4-flash\nSCRIPT_GENERATION_TOKEN_COST=20\n```\n\n## Request flow\n\n1. Client `ScriptGeneratorSection` → `POST /api/script-generator/generate`\n2. Route: `ensureSessionUser` → `spendTokens` → load chat + references from Prisma\n3. `buildDeepSeekMessages(profile, messages, referencesPrompt)` → `deepseekChatCompletion`\n4. On DB/DeepSeek failure after spend: `creditTokens` (refund)\n\nDeepSeek call: 60s abort timeout, `temperature: 0.55`, `max_tokens: 1800`.\n\n## Prompt policy (summary)\n\nFull text lives in `script-generator-prompt.ts`. Core rules:\n\n- **Role:** experienced editor/copywriter; output must not read as generic AI\n- **Banned:** cliché openers, bureaucratic phrasing, empty intensifiers, symmetric “first/second/third” lists\n- **Required:** varied sentence length, concrete detail, active voice, strong opening thought\n- **Permanent editorial policy:** no filler, conclusions before explanations, authorial stance, uniqueness over volume\n- **References:** video transcript/context via `buildReferencesPromptBlock`; ref-only prompt constant `SCRIPT_PROMPT_REF_ONLY`\n\n## Client/server boundary\n\n**Client must NOT import:**\n\n- `@/lib/prisma`\n- `script-chat-reference`\n- `script-generator-prompt`\n- `env-server`\n\n## Related APIs\n\n| Route | Purpose |\n|-------|---------|\n| `GET/POST /api/script-generator/chats` | Chat list / create |\n| `GET/DELETE /api/script-generator/chats/[chatId]` | Chat + messages |\n| `POST .../references`, `import-video`, `with-reference` | Attach videos |\n| `POST/GET /api/script-generator/profile` | User script profile |\n\n## Operational notes (from audits)\n\n- Generate route loads full message history each call — cost/latency grows with chat length\n- No streaming to client today\n- Refunds on failure are implemented; spend happens before AI call\n","business":"# Billing & Monetization (продукт)\n\n> Источник правды в коде: `src/lib/billing/billing.config.ts`. Обновлено: 2026-05-31.\n\n## Тарифы\n\n| Тариф | Цена / мес | Цена / год | Токены | Конкуренты |\n|-------|----------:|-----------:|-------:|-----------:|\n| **FREE** | 0 ₽ | — | 60 разово | 0 |\n| **TRIAL** | 0 ₽ · 3 дня | — | 200 при активации | 1 |\n| **PRO** | 2 490 ₽ | 24 900 ₽ | 3 000 / мес | 30 |\n| **BUSINESS** | 11 900 ₽ | 119 000 ₽ | 18 000 / мес | 100 |\n\n## Пакеты токенов\n\n| Пакет | Цена | Токены |\n|-------|-----:|-------:|\n| SMALL | 490 ₽ | 500 |\n| MEDIUM | 1 490 ₽ | 2 000 |\n| LARGE | 2 990 ₽ | 5 000 |\n\n## Стоимость действий (токены)\n\n| Действие | Стоимость |\n|----------|----------:|\n| Поиск роликов | 5 |\n| Ещё ролики | 5 |\n| Генерация сценария | 25 |\n| Транскрибация | 10 |\n| Добавить конкурента | 35 |\n| Обновить конкурента | 35 |\n| Daily Sync | 5 |\n\n## Ledger\n\nТипы операций: `SUBSCRIPTION_GRANT`, `TRIAL_GRANT`, `FREE_GRANT`, `TOKEN_PACK`, `SPEND`, `REFUND`, `ADMIN_ADJUSTMENT`.\n\n## API\n\n| Endpoint | Назначение |\n|----------|------------|\n| `GET /api/billing/config` | Публичный конфиг |\n| `GET /api/billing/me` | Тариф + баланс + ledger |\n| `POST /api/billing/trial` | Активация trial |\n| `POST /api/billing/orders` | Создание заказа |\n| `POST /api/billing/orders/[id]/confirm` | Подтверждение оплаты (admin/webhook) |\n| `GET /api/admin/billing/stats` | MRR, пользователи, токены |\n\n## UI\n\n- `/billing` — страница «Мой тариф»\n- Аккаунт → Тарифы / Токены — из конфига\n- `/admin` — блок Billing & Monetization\n\n## Платежи\n\nЗаказы создаются в `BillingOrder` со статусом `PENDING`. После оплаты — `confirm` начисляет токены и активирует подписку. **YooKassa/Stripe — следующий шаг.**\n\n\n---\n\n# Viral — Обзор тарифов\n\n> Единый источник правды по коммерческой упаковке. Обновлено: 2026-05-31.\n>\n> **Токены и лимиты** — из `unit-economics.md` v2 (исследование прайсов май 2026). **Биллинг не подключён** (`mock-dashboard-panels.tsx` — демо).\n\n## Что продаём\n\nViral — дашборд на Next.js для блогеров, экспертов, SMM-специалистов и агентств, которые работают с коротким вертикальным видео:\n\n| Возможность | Реализация в коде |\n|-------------|-------------------|\n| Поиск видео (YouTube Shorts + Instagram Reels) | `POST /api/videos/feed` |\n| Отслеживание конкурентов («шпион») | `/api/competitors/*` |\n| Сохранённые ролики | `/api/saved-videos` |\n| Генерация сценариев | DeepSeek через `/api/script-generator/generate` |\n| Транскрибация (для референсов в сценариях) | Groq Whisper через `/api/videos/transcribe` |\n| Живые тренды в сайдбаре | `GET /api/trends/realtime` |\n\n**Не входит в продукт:** Content Radar (исключён из всех тарифов). Полноценный AI-разбор ролика в `VideoDetailPanel` — **только демо-интерфейс**, платного бэкенда пока нет.\n\n---\n\n## Каталог тарифов\n\n| Тариф | В месяц | В год (2 месяца в подарок) | Оплата |\n|-------|---------|----------------------------|--------|\n| **Free Preview** | 0 ₽ | — | Без карты |\n| **Trial** | 0 ₽ на 3 дня | — | Карта → Creator |\n| **Creator** | **2 990 ₽** | **29 900 ₽** | Подписка |\n| **Producer** | **6 990 ₽** | **69 900 ₽** | Подписка |\n| **Visioner** | **14 990 ₽** | **149 900 ₽** | Подписка |\n\n*Годовой тариф = оплата за 10 месяцев, польза 12 (~17% скидка). **Предложено** до подключения платёжки (YooKassa / Stripe).*\n\n---\n\n## Детали по тарифам\n\n### Free Preview\n\n| Параметр | Значение |\n|----------|----------|\n| **Цена** | 0 ₽ |\n| **Целевая аудитория** | Блогер на этапе «присмотреться»; начинающий эксперт; студент |\n| **Токены** | **60** разово | COGS ~45 ₽; хватит на 1 сценарий + пробу «ещё ролики» |\n| **Что включено** | Лента из кэша БД, тренды (чтение), до **3** сохранений |\n| **Лимиты** | **Без external ingest**; 0 конкурентов; без транскрибации |\n| **Зачем такие лимиты** | Защита расходов TikHub/YouTube; апгрейд до привычного использования; лента из БД всё равно показывает ценность |\n| **Триггеры апгрейда** | Блок «Ещё ролики»; исчерпан лимит сценариев; нужен шпион; нужна свежая выдача Instagram/YouTube |\n\n### Trial (3 дня, карта обязательна)\n\n| Параметр | Значение |\n|----------|----------|\n| **Цена** | 0 ₽ на 72 часа, далее Creator, если не отменили |\n| **Целевая аудитория** | Эксперт или SMM, готовый прогнать полный рабочий цикл до оплаты |\n| **Токены** | **450** на 3 дня (~25% месячного Creator) |\n| **Что включено** | Полный набор Creator на 3 дня |\n| **Лимиты** | Как у Creator; жёсткая остановка по окончании триала или при нулевом балансе |\n| **Зачем такие лимиты** | Хватает на 3–5 рабочих сессий (поиск + сценарии + 1–2 конкурента); карта снижает злоупотребления |\n| **Триггеры апгрейда** | Баннер «триал заканчивается»; баланс &lt; 50 токенов; привычка к ежедневному sync конкурентов |\n\n### Creator — 2 990 ₽ / месяц\n\n| Параметр | Значение |\n|----------|----------|\n| **Цена** | 2 990 ₽ / мес · 29 900 ₽ / год |\n| **Целевая аудитория** | Блогер, эксперт, фриланс-SMM; 4–12 Reels/Shorts в месяц |\n| **Токены** | **1 800 / месяц** (сгорают) |\n| **Что включено** | Поиск + внешний ingest, тренды, библиотека сохранений, генератор сценариев, транскрибация, шпион |\n| **Лимиты** | **5** профилей конкурентов (в коде `MAX_COMPETITORS_PER_USER = 10` — коммерческий потолок **предложено**); **200** сохранённых роликов; throttle внешнего поиска 15 мин/запрос (из кода) |\n| **Зачем такие лимиты** | 1 800 tok ≈ 15 сценариев + 25 load-more + лёгкий шпион (см. unit-economics v2) |\n| **Триггеры апгрейда** | &gt;5 конкурентов; несколько клиентов; &gt;20 сценариев в неделю |\n\n### Producer — 6 990 ₽ / месяц\n\n| Параметр | Значение |\n|----------|----------|\n| **Цена** | 6 990 ₽ / мес · 69 900 ₽ / год |\n| **Целевая аудитория** | SMM на 2–4 клиента, продюсер с несколькими нишами |\n| **Токены** | **5 500 / месяц** |\n| **Лимиты** | **10** конкурентов; **500** saves |\n| **Почему 5 500** | COGS ~420 ₽ → маржа ~94%; мост между Creator и Visioner |\n| **Триггеры апгрейда** | &gt;10 конкурентов; команда; &gt;50 сценариев/мес |\n\n### Visioner — 14 990 ₽ / месяц\n\n| Параметр | Значение |\n|----------|----------|\n| **Цена** | 14 990 ₽ / мес · 149 900 ₽ / год |\n| **Целевая аудитория** | Агентство, продюсер, контент-команда, бизнес с несколькими нишами |\n| **Токены** | **12 000 / месяц** |\n| **Лимиты** | **15** конкурентов; **2 000** saves |\n| **Почему 12 000** | COGS агентства ~1 550 ₽ → маржа ~90%; 25k избыточно |\n| **Триггеры апгрейда** | SSO, API, white-label — enterprise-продажи |\n\n---\n\n## Сравнительная матрица функций\n\n| Функция | Free | Trial | Creator | Producer | Visioner |\n|---------|:----:|:-----:|:-------:|:--------:|:--------:|\n| Лента (кэш БД) | ✅ | ✅ | ✅ | ✅ | ✅ |\n| External ingest | ❌ | ✅ | ✅ | ✅ | ✅ |\n| «Ещё ролики» | ❌ | ✅ | ✅ | ✅ | ✅ |\n| Тренды | ✅ | ✅ | ✅ | ✅ | ✅ |\n| Saves | 3 | 150 | 150 | 500 | 2 000 |\n| Сценарии | ❌ | ✅ | ✅ | ✅ | ✅ |\n| Конкуренты | 0 | 5 | 5 | 10 | 15 |\n| **Токены** | 60 | 450/3д | **1 800** | **5 500** | **12 000** |\n\n---\n\n## Списания токенов: код vs коммерция (v2)\n\n| Действие | Код | Коммерция v2 | COGS ≈ |\n|----------|----:|-------------:|-------:|\n| Первый поиск | 0 | 0 | 0–0,25 ₽ |\n| «Ещё ролики» | 5 | **8** | 0,15–0,40 ₽ |\n| Сценарий | 20 | **25** | ~0,20 ₽ |\n| Транскрибация | 5 | **6** | ~0,05 ₽ |\n| Add / refresh конкурента | 30 | **35** | ~0,30 ₽ |\n| Daily sync | 5 | **6** | ~0,10 ₽ |\n\nНовые пользователи сейчас получают **12 400** токенов (`DEFAULT_BALANCE` в `token-wallet.ts`) — это **dev/demo**, не коммерческий план.\n\n---\n\n## Позиционирование на рынке\n\n*Конкуренты — для **ценового контекста**, не для сравнения функций один к одному. Viral заточен под исследование Shorts/Reels + сценарии + шпион в РФ/СНГ.*\n\n### vs инструменты класса LightReel ($199/мес, ~16 900 ₽)\n\n| Параметр | LightReel (публично) | Viral Creator | Viral Visioner |\n|----------|---------------------|---------------|----------------|\n| Входная цена | ~$199/мес (~16 900 ₽) | 2 990 ₽ (~$35) | 14 990 ₽ (~$176) |\n| Триал | 3 дня бесплатно | 3 дня + карта | — |\n| Позиционирование | UGC-исследование, хуки, AI-агент | Поиск + шпион + сценарии для РФ/СНГ | Масштаб агентства |\n| Лимиты поиска | ~400–1 000 запросов/мес (обзоры) | Ingest через токены | Большой пул токенов |\n\n**Где Viral сильнее:** в 6–10 раз ниже вход для рынка РФ/СНГ; шпион и сценарии в одном продукте; Instagram через TikHub в одном окне.\n\n**Где слабее:** меньше «библиотеки UGC» в маркетинге; нет шаринга ссылок в команде; узнаваемость ниже западных брендов.\n\n**Цена:** Creator на порядок дешевле — ок, если API-расходы держит токеномика.\n\n### vs тариф «Creator+» ($25–35/мес, ~2 100–3 000 ₽)\n\nПример: AIReel Pro ~$25/мес (~2 100 ₽) — другая категория (генерация видео), но похожая психология «кредитов».\n\n| Параметр | Типичный Creator+ | Viral Creator |\n|----------|-------------------|---------------|\n| Цена | $25–35/мес (~2 100–3 000 ₽) | 2 990 ₽ (~$35) |\n| Ценность | Кредиты на генерацию | Исследование + шпион + сценарии |\n| Перерасход | Пакеты кредитов | Пакеты токенов **предложено** |\n\n**Где Viral сильнее:** цикл «нашёл → сохранил → написал сценарий», а не только генерация.\n\n**Где слабее:** нет рендера видео — монтаж и съёмка снаружи.\n\n**Цена:** 2 990 ₽ — на уровне global Creator-SaaS; для удержания в РФ нужна годовая скидка.\n\n### vs агентский сегмент ($99–199/мес, ~8 400–16 900 ₽)\n\n| Параметр | Агентские research-инструменты | Viral Visioner |\n|----------|----------------------------------|----------------|\n| Цена | $99–199+/мес (~8 400–16 900 ₽) | 14 990 ₽ (~$176) |\n| Места | Часто 3–5 | 1 (команда — в планах) |\n| Объём | Токены + лимиты | 12 000 токенов — жёсткий потолок |\n\n**Где Viral сильнее:** заточен под Shorts/Reels + шпион + сценарии; дешевле позиционирования LightReel для агентств.\n\n**Где слабее:** нет RBAC на несколько мест, SSO, SLA.\n\n**Цена:** 14 990 ₽ оправдана как «рабочий стол агентства», а не безлимитный AI.\n\n---\n\n## Итоговые рекомендации (v2)\n\n> Полный пересчёт: `unit-economics.md` v2. Старая модель (4k/25k tok, маржа 45–70%) **заменена**.\n\n### Если запускать оплату завтра\n\n| Решение | Рекомендация |\n|---------|--------------|\n| **Тарифы** | Creator **2 990 ₽** + Visioner **14 990 ₽**; Producer **6 990 ₽** при demand |\n| **Токены** | Free **60** · Trial **450** · Creator **1 800** · Producer **5 500** · Visioner **12 000** |\n| **Trial** | Да, 3 дня + карта |\n| **Free** | Да, без external ingest |\n\n### Рекомендуемые лимиты\n\n| Лимит | Creator | Producer | Visioner |\n|-------|---------|----------|----------|\n| Токены / мес | 1 800 | 5 500 | 12 000 |\n| Конкуренты | 5 | 10 | 15 |\n| Сохранённые ролики | 150 | 500 | 2 000 |\n\n### Маржинальность (v2)\n\n| Этап | Платящих | MRR | Валовая маржа |\n|------|----------|-----|:-------------:|\n| Старт | 50 | ~240k | **~93%** |\n| Traction | 250 | ~1,2M | **~95%** |\n| Масштаб | 1 000 | ~4,8M | **~95%** |\n\n*Микс 70/15/15 Creator/Producer/Visioner.*\n\n### Главные риски\n\n1. **Sync ingest на Vercel** — главный COGS-риск\n2. **Creator abuse** — маржа до 20% без rate limits\n3. **Демо-баланс 12 400**\n4. **Trends poll off-tab**\n\n### Главные возможности\n\n1. TikHub **$0,001–0,002**/call — дешевле старых допущений\n2. DeepSeek **~0,20 ₽**/сценарий\n3. Producer tier для SMM без Visioner\n\n---\n\n## Как обновлять документ\n\n| Что менять | Файл |\n|------------|------|\n| Цены / лимиты тарифов | `pricing-overview.md` |\n| COGS API / веса токенов | `feature-costs.md` |\n| Сценарии по масштабу | `unit-economics.md` |\n| Воронка | `user-growth-model.md` |\n| Этапы роста | `pricing-roadmap.md` |\n\nПересборка дэшборда: `node project-docs/build-dashboard.mjs`\n\n\n---\n\n# Юнит-экономика v2 — исследование и пересчёт\n\n> Пересборка с нуля на основе прайсов поставщиков (май 2026) и карты действий из кода.  \n> **Заменяет** модель от 2026-05-30 (таблицы с маржой 88–90% **завышали** прибыльность — см. § «Расхождения»).  \n> Курс для пересчёта: **95 ₽ / USD**. Источники — в §1.\n\n---\n\n## 1. Исследование: реальные цены поставщиков\n\n### 1.1 TikHub\n\n**Модель:** pay-as-you-go, без абонплаты; списание только при HTTP 200.  \n**Скидки:** 0% до 1 000 req/день → до **50%** при 30 000+ req/день ([docs](https://docs.tikhub.io/4592751m0)).  \n**Бесплатно:** ~50 запросов на тест ([tikhub.io/pricing](https://tikhub.io/pricing)).\n\n| Endpoint (используется в Viral) | Файл | Цена / запрос | Источник |\n|--------------------------------|------|--------------:|----------|\n| `GET …/instagram/v2/search_reels` | `tikhubInstagram.ts` | **$0,002** | [docs](https://docs.tikhub.io/387337819e0) |\n| `GET …/instagram/v2/fetch_user_reels` | `tikhubInstagram.ts` | **~$0,001–0,002** (база $0,001; v2 — уточнить в кабинете) | [docs v1 reels](https://docs.tikhub.io/387337788e0), [pricing intro](https://docs.tikhub.io/4592751m0) |\n| `GET …/instagram/v3/get_post_info_by_code` | транскрибация / refresh | **~$0,001** (базовый тариф) | [pricing intro](https://docs.tikhub.io/4592751m0) |\n| `GET …/instagram/v2/fetch_post_info` | fallback поста | **~$0,001** | idem |\n\n**Как Viral тратит TikHub (из кода):**\n\n| Действие пользователя | Вызовов TikHub | COGS (без скидки) |\n|----------------------|---------------:|------------------:|\n| Ingest IG при поиске | 1× search_reels | **$0,002** (~0,19 ₽) |\n| Добавить IG-конкурента | до 3× fetch_user_reels (+ retry) | **$0,003–0,006** |\n| Refresh Reels конкурента | до 3× fetch_user_reels | **$0,003–0,006** |\n| Daily sync IG-конкурента | 1× fetch_user_reels / профиль / день | **~$0,001** |\n| Транскрибация IG (нет субтитров) | 1–2× post info | **$0,001–0,002** |\n\n**Какой тариф TikHub нужен Viral:** отдельный план не требуется — **pay-as-you-go + пополнение баланса**. При 500–2 000 req/день скидка 10–20% realistic. Enterprise ($3 000+) — только при &gt;30k req/день.\n\n---\n\n### 1.2 DeepSeek (`deepseek-v4-flash`, код: `deepseek-generate.ts`)\n\nОфициальные цены ([api-docs.deepseek.com](https://api-docs.deepseek.com/quick_start/pricing)):\n\n| Бакет | $ / 1M токенов |\n|-------|---------------:|\n| Input cache miss | $0,14 |\n| Input cache hit | $0,0028 |\n| Output | $0,28 |\n\nПараметры в коде: `max_tokens: 1800`, `temperature: 0.55`, **полная история чата** каждый вызов.\n\n| Сценарий | Input tok | Output tok | COGS USD | COGS ₽ |\n|----------|----------:|-----------:|---------:|-------:|\n| Короткий (1-й сценарий, мало истории) | ~4 000 | ~800 | **~$0,0008** | **~0,08 ₽** |\n| Типичный (профиль + 2 референса + 4 сообщения) | ~12 000 | ~1 400 | **~$0,0021** | **~0,20 ₽** |\n| Длинный (10+ сообщений в чате) | ~35 000 | ~1 800 | **~$0,0054** | **~0,51 ₽** |\n\n*Cache hit для system prompt снижает input на ~30–50% — в расчётах не заложено (оптимизм).*\n\n---\n\n### 1.3 Groq Whisper (`whisper-large-v3-turbo`, код: `transcription-config.ts`)\n\n| Метрика | Значение | Источник |\n|---------|----------|----------|\n| Цена | **$0,04 / час** аудио | [groq.com/pricing](https://groq.com/pricing) |\n| Минимум | 10 сек / запрос | idem |\n| Модель по умолчанию | `whisper-large-v3-turbo` | `transcription-config.ts` |\n\n| Объём | Длительность | COGS USD | COGS ₽ |\n|------:|-------------|---------:|-------:|\n| 1 ролик | 45 с | $0,0005 | **~0,05 ₽** |\n| 10 роликов | 45 с каждый | $0,005 | **~0,48 ₽** |\n| 100 роликов | 45 с каждый | $0,05 | **~4,75 ₽** |\n\n*Если есть субтитры в метаданных — Groq **не вызывается** (COGS = 0).*\n\n---\n\n### 1.4 YouTube Data API (код: `ingest-youtube.ts`)\n\n| Операция | Units | При ingest |\n|----------|------:|-----------|\n| `search.list` | 100 | 1× |\n| `videos.list` | 1 | 1× |\n| **Итого ingest YT** | **~101** | на новый запрос с внешним поиском |\n\nБесплатная квота: **10 000 units/день** ([Google](https://developers.google.com/youtube/v3/determine_quota_cost)).  \nПри 50 ingest/день ≈ 5 050 units — **вписываемся в free tier** до ~99 ingest/день.\n\n---\n\n### 1.5 Vercel Pro ([docs](https://vercel.com/docs/functions/usage-and-pricing))\n\n| Метр | Тариф |\n|------|-------|\n| Seat | $20/мес + **$20 usage credit** |\n| Active CPU | $0,128 / CPU-hour |\n| Provisioned Memory | $0,0106 / GB-hour |\n| Invocations | $0,60 / 1M |\n\n**Драйверы в Viral:**\n\n| Паттерн | Длительность / частота | Нагрузка |\n|---------|------------------------|----------|\n| `POST /api/videos/feed` + sync ingest | **5–20 с** wall time, CPU активен на I/O | **Высокая** |\n| `POST …/script-generator/generate` | до 60 с | Средняя |\n| `GET /api/trends/realtime` | poll **120 с** (`LiveTrendsSidebar`) | Средняя на MAU (фон) |\n| Saved / session / SSR | &lt;500 ms | Низкая |\n\n**Оценка Vercel / мес (только compute, iad1):**\n\n| MAU (активных) | Invocations | GB-hours (оценка) | CPU-hours (оценка) | **Итого USD** | **₽** |\n|---------------:|------------:|------------------:|-------------------:|--------------:|------:|\n| 100 | ~400k | ~80 | ~8 | **~$25–35** | **~2 400–3 300** |\n| 500 | ~2M | ~350 | ~35 | **~$90–130** | **~8 500–12 400** |\n| 1 000 | ~4M | ~650 | ~65 | **~$160–240** | **~15 200–22 800** |\n| 5 000 | ~18M | ~2 800 | ~280 | **~$650–950** | **~62 000–90 000** |\n\n*Credit $20/seat покрывает только ранний этап. Sync ingest — главный риск Vercel, не TikHub.*\n\n---\n\n### 1.6 Supabase Pro ([supabase.com/pricing](https://supabase.com/pricing))\n\n| Масштаб | План | Compute | **₽ / мес** |\n|---------|------|---------|------------:|\n| Старт (&lt;200 MAU) | Pro | Micro (включён $10 credit) | **~2 400** ($25) |\n| 500 MAU | Pro | **Small** recommended | **~3 800** ($25 + $15 compute) |\n| 1 000 MAU | Pro | **Medium** | **~7 100** ($25 + $60) |\n| 5 000 MAU | Pro | **Large** | **~12 800** ($25 + $110) |\n\nPooler (port 6543): до **200** conn на Micro — при росте feed-нагрузки нужен Small+.  \nStorage/bandwidth на раннем этапе **внутри лимитов** Pro (8 GB DB, 250 GB egress).\n\n---\n\n## 2. Карта действий пользователя (из кода)\n\n| Действие | Токены (код) | COGS API | COGS infra | Класс |\n|----------|-------------:|----------|------------|-------|\n| Первый поиск / лента | 0 | YT+TikHub **если ingest** | DB + **долгий HTTP** | 🟡→🔴 при ingest |\n| «Ещё ролики» | 5 | как поиск при thin pool | DB + HTTP | 🟡→🔴 |\n| Throttle 15 мин / query | — | кэш-поведение | `appRuntimeState` | 🟢 |\n| Повторный поиск (throttled) | 0 | **0** внешний | DB only | 🟢 |\n| Сохранить ролик | 0 | 0 | Postgres write | 🟢 |\n| Открыть карточку / saved state | 0 | 0 | read | 🟢 |\n| Тренды poll (120 с) | 0 | 0 | invocations + DB | 🟡 |\n| Lazy refresh trends | 0 | возможен YT/TikHub | тяжёлый POST | 🔴 |\n| Генерация сценария | 20 | DeepSeek | HTTP 60s | 🟡 |\n| Транскрибация | 5 | Groq или 0 | HTTP | 🟢–🟡 |\n| Добавить IG-конкурента | 30 | 3–6× TikHub | sync HTTP | 🔴 |\n| Refresh Reels | 30 | 3–6× TikHub | sync HTTP | 🔴 |\n| Daily sync / конкурент | 5 | 1× TikHub или YT | batch | 🟡 |\n\n**Критически дорогие:** sync ingest в feed, competitor add/refresh, lazy trends refresh.  \n**Бесплатные для нас (пока):** browse DB, saves, throttled re-search.  \n**Скрытый налог:** trends poll **вне вкладки Home** (аудит) — лишние invocations.\n\n---\n\n## 3. Пользовательские сценарии (COGS / мес)\n\n| Профиль | Действия / мес | COGS API ₽ | COGS infra ₽ | **COGS итого** | Выручка | **Маржа** |\n|---------|----------------|----------:|-------------:|---------------:|--------:|----------:|\n| 1. Любопытный | лента DB, 20× trends poll | ~5 | ~40 | **~45** | 0 | — |\n| 2. Начинающий блогер | 8 search (3 ingest), 6 load-more, 4 script, 2 transcribe | ~15 | ~80 | **~95** | 0 / trial | — |\n| 3. Активный блогер | 25 ingest search, 30 load-more, 12 script, 8 transcribe, 3×15 sync | ~55 | ~180 | **~235** | 2 990 | **92%** |\n| 4. SMM (3 клиента) | 40 ingest, 50 load-more, 20 script, 8 sync×3 конк. | ~120 | ~320 | **~440** | 2 990 | **85%** |\n| 5. Продюсер | 60 ingest, 80 load-more, 25 script, 8 конк.×20 sync, 6 refresh | ~280 | ~450 | **~730** | 2 990 | **76%** |\n| 6. Агентство | 100 ingest, 150 load-more, 45 script, 12×22 sync, 15 refresh | ~650 | ~900 | **~1 550** | 14 990 | **90%** |\n\n*Infra = аллокация Vercel+Supabase на пользователя при указанном MAU.*\n\n**Вывод:** при **2 990 ₽** маржа падает ниже 80% у **продюсера** на одном аккаунте — нужны лимиты конкурентов/sync, не только токены.\n\n---\n\n## 4. Worst-case analysis (один платящий / мес)\n\n| Тип | Поведение | COGS ₽ | Выручка ₽ | Валовая прибыль | Маржа |\n|-----|-----------|-------:|----------:|----------------:|------:|\n| Минимальный | 2 script, DB browse | ~30 | 2 990 | 2 960 | 99% |\n| Средний | профиль «активный блогер» | ~235 | 2 990 | 2 755 | 92% |\n| Максимальный (честный) | профиль «продюсер» | ~730 | 2 990 | 2 260 | 76% |\n| Злоупотребление | 500 load-more + ingest, 100 script, 15×30 sync | **~2 400** | 2 990 | **590** | **20%** |\n| Злоупотребление Visioner | то же на 14 990 | ~2 400 | 14 990 | 12 590 | 84% |\n| Агентство (норма) | 12 конкурентов, команда 3 чел. | ~1 550 | 14 990 | 13 440 | 90% |\n\n**Visioner выгоден при злоупотреблении** — цена ×5, COGS ×3,3. **Creator опасен** без rate limits.\n\n---\n\n## 5. Рекомендуемые тарифы (новая модель — не 150/1000/4000/25000)\n\nЦены **2 990 / 14 990 ₽** сохраняем (рынок РФ). **Токены и лимиты — новые**, из COGS.\n\n| Тариф | Цена | Токены / период | Лимиты | Почему |\n|-------|------|----------------:|--------|--------|\n| **Free Preview** | 0 ₽ | **60** разово | DB-лента, 3 saves, 0 конкурентов, 0 ingest | COGS ~45 ₽; 60 tok ≈ 1 script + 2 load-more для «вау» |\n| **Trial** | 0 ₽ · 3 дня + карта | **450** | полный Creator | ~1/5 месячного пула; хватает на 1 рабочую неделю сценария |\n| **Creator** | 2 990 ₽/мес | **1 800 / мес** | 5 конкурентов, 150 saves, ingest on | Покрывает профиль «активный блогер» (~930 tok) + запас; COGS ~235 ₽ → маржа ~92% |\n| **Producer** *(новый)* | **6 990 ₽/мес** | **5 500 / мес** | 10 конкурентов, 500 saves | Для SMM/продюсера (~2 500 tok); COGS ~730 ₽ → маржа ~89% |\n| **Visioner** | 14 990 ₽/мес | **12 000 / мес** | 15 конкурентов, 2 000 saves | Агентство ~4 000 tok; COGS ~1 550 ₽ → маржа ~90%; ниже 25k — меньше arbitrage |\n\n**Веса токенов (коммерция, ≠ только код):**\n\n| Действие | Новый вес | Было в коде |\n|----------|----------:|------------:|\n| Поиск (1-я страница) | 0 | 0 |\n| «Ещё ролики» | **8** | 5 |\n| Сценарий | **25** | 20 |\n| Транскрибация | **6** | 5 |\n| Daily sync | **6** | 5 |\n| Add / refresh конкурента | **35** | 30 |\n\n---\n\n## 6. Масштаб: выручка и затраты (реалистичный микс)\n\nМикс платящих: 70% Creator / 15% Producer / 15% Visioner → **ARPU ≈ 4 780 ₽**.\n\n| Платящих | MRR ₽ | API ₽ | Vercel ₽ | Supabase ₽ | **Затраты ₽** | **Валовая прибыль** | **Маржа** |\n|--------:|------:|------:|---------:|-----------:|--------------:|--------------------:|----------:|\n| 10 | 47 800 | 1 800 | 2 800 | 2 400 | **7 000** | 40 800 | **85%** |\n| 50 | 239 000 | 7 500 | 6 500 | 2 400 | **16 400** | 222 600 | **93%** |\n| 100 | 478 000 | 16 000 | 12 000 | 3 800 | **31 800** | 446 200 | **93%** |\n| 500 | 2 390 000 | 72 000 | 45 000 | 7 100 | **124 100** | 2 265 900 | **95%** |\n| 1 000 | 4 780 000 | 145 000 | 85 000 | 12 000 | **242 000** | 4 538 000 | **95%** |\n| 5 000 | 23 900 000 | 620 000 | 380 000 | 45 000 | **1 045 000** | 22 855 000 | **96%** |\n\n*API = TikHub + DeepSeek + Groq + YT overages. Не включает ЗП.*\n\n**Break-even (с ЗП):** solo ~**15–20** платящих; 1 FTE 200k ₽ ~**55–65**; команда ~**280–320**.\n\n---\n\n## 7. Расхождения со старой моделью (2026-05-30)\n\n| Утверждение старой модели | Факт v2 |\n|---------------------------|---------|\n| Маржа 89% @ 100 paid | **93%** при реальных API-ценах, **но** 76% у тяжёлого Creator без лимитов |\n| TikHub «главная неизвестность» | **Цены известны** ($0,001–0,002); риск = **объём + sync ingest на Vercel** |\n| 4 000 / 25 000 токенов | **Завышены**; достаточно **1 800 / 12 000** при новых весах |\n| API $3,50/user | Реально **~$1,2–2,5** / платящий при умеренном use |\n| Break-even 8–12 paid | **15–20** с учётом Vercel Pro + Supabase fixed |\n\n---\n\n## 8. Если запускать оплату завтра\n\n| Решение | Рекомендация |\n|---------|--------------|\n| **Тарифы** | Creator **2 990 ₽** + Visioner **14 990 ₽**; добавить **Producer 6 990 ₽** в первые 60 дней если &gt;20% юзеров упираются в лимит конкурентов |\n| **Токены** | Free **60** · Trial **450** · Creator **1 800/мес** · Producer **5 500** · Visioner **12 000** |\n| **Trial** | **Да**, 3 дня + карта → Creator; **450 токенов** |\n| **Free** | **Да**, но **без external ingest** — иначе ~0,19 ₽ × каждый любопытный |\n| **Средний тариф** | **Producer через 100 paid**, если данные подтвердят |\n| **Опасные лимиты** | ① sync ingest ② daily sync × N конкурентов ③ demo 12 400 tok ④ trends poll off-tab |\n| **P0 инженерия** | Async ingest queue; rate limit feed/generate; billing gates; лог `usage` DeepSeek |\n\n**Главный вывод:** продукт **можно монетизировать** на текущих ценах, но **старые пулы токенов (4k/25k) и маржа 88% без opex — неверны**. Реальная угроза — не TikHub $/call, а **Vercel + злоупотребление Creator**.\n\n---\n\n## Источники\n\n- TikHub: https://docs.tikhub.io/4592751m0 · https://docs.tikhub.io/387337819e0 · https://tikhub.io/pricing  \n- DeepSeek: https://api-docs.deepseek.com/quick_start/pricing  \n- Groq: https://groq.com/pricing  \n- Vercel: https://vercel.com/docs/functions/usage-and-pricing  \n- Supabase: https://supabase.com/pricing  \n- YouTube quota: https://developers.google.com/youtube/v3/determine_quota_cost  \n- Код Viral: `tikhubInstagram.ts`, `feed/route.ts`, `deepseek-generate.ts`, `LiveTrendsSidebar.tsx`, `competitor-instagram-reels-sync.ts`\n\n\n---\n\n# Модель роста пользователей\n\n> Воронка и прогноз MRR. Обновлено: 2026-05-30.\n>\n> **ARPU v2 ≈ 4 780 ₽** (70/15/15) — `unit-economics.md` §6.\n>\n> **⚠️ Конверсии и отток — допущения.** Нет аналитики и истории платежей в репозитории.\n\n---\n\n## Определение воронки\n\n```\nПосетитель → Free Preview → Trial (карта) → Платный (Creator/Visioner) → Удержание / отток\n```\n\n| Этап | Продукт сегодня | Коммерческая цель |\n|------|-----------------|-------------------|\n| Free Preview | Анонимная сессия + 12 400 demo-токенов | 150 токенов, лента только из БД **предложено** |\n| Trial | Не реализован | 3 дня, карта, 1 000 токенов **предложено** |\n| Платный | Демо-UI тарифов | YooKassa / Stripe **предложено** |\n\n---\n\n## Допущения по конверсии\n\n| Метрика | Оптимистично | Реалистично | Пессимистично | Обоснование |\n|---------|--------------|-------------|---------------|-------------|\n| Посетитель → Free | 8% | 5% | 2% | Нишевый B2C; рынок блогеров РФ/СНГ |\n| Free → Trial | 12% | 7% | 3% | Трение карты; нужен сильный блок «ещё ролики» |\n| Trial → Paid (день 4) | 45% | 28% | 15% | Сравнимо с dev-tool trials с картой |\n| Месячный churn (paid) | 4% | 7% | 12% | Creator SaaS; сезонность контента |\n| Creator → Visioner / мес | 2% | 1% | 0,5% | Доля агентств |\n| Доля годовых | 15% | 10% | 5% | После 3-го месяца доверия |\n\n---\n\n## Допущения по оттоку (платящая база)\n\n| Когорта | Churn / мес (реалистично) | Комментарий |\n|---------|--------------------------:|-------------|\n| Creator | **7%** | Чувствительны к цене; пауза в «тихие» месяцы |\n| Visioner | **5%** | Выше cost of switch, если заведены конкуренты |\n| Смешанный | **6,5%** | Вес 85/15 |\n\n**Средний срок жизни платящего:** ~15 мес (1 / 0,065) ⚠️\n\n---\n\n## Помесячный прогноз — реалистичный сценарий\n\nСтарт **месяц 0:** продукт готов принимать оплату; минимальный маркетинг.\n\n| Мес | Новых trial | Trial→Paid | Новых paid | Отток | **Платящих (конец)** | **MRR (₽)** |\n|----:|------------:|-----------:|-----------:|------:|---------------------:|------------:|\n| 1 | 80 | 28% | 22 | 2 | **22** | 105 000 |\n| 3 | 150 | 28% | 42 | 8 | **78** | 374 000 |\n| 6 | 220 | 30% | 66 | 18 | **185** | 886 000 |\n| 12 | 350 | 32% | 112 | 35 | **420** | 2 012 000 |\n\n*MRR = платящие × 4 790 ₽ ARPU. Churn на растущей базе.*\n\n### Детализация месяца 1 (реалистично)\n\n| Метрика | Значение |\n|---------|--------:|\n| Визиты на сайт | **⚠️ 2 500** (запуск + знакомые + 1 канал) |\n| Регистрации Free (5%) | 125 |\n| Старты trial (7% от free) | 9 → разгон до **80** с онбордингом ⚠️ |\n| Новых платящих | 22 |\n| Микс | 19 Creator, 3 Visioner |\n| MRR | 19×2 990 + 3×14 990 ≈ **101 780 ₽** |\n\n*Объём trial в месяце 1 предполагает ручной outreach — не чисто органика.*\n\n---\n\n## Помесячный прогноз — оптимистичный\n\n| Мес | Платящих (конец) | MRR (₽) |\n|----:|-----------------:|--------:|\n| 1 | 45 | 153 000 |\n| 3 | 160 | 544 000 |\n| 6 | 380 | 1 292 000 |\n| 12 | 950 | 3 230 000 |\n\nБольше трафика (8% signup), 45% trial→paid, 4% churn.\n\n---\n\n## Помесячный прогноз — пессимистичный\n\n| Мес | Платящих (конец) | MRR (₽) |\n|----:|-----------------:|--------:|\n| 1 | 8 | 48 000 |\n| 3 | 28 | 169 000 |\n| 6 | 55 | 332 000 |\n| 12 | 110 | 664 000 |\n\nМало трафика, 15% trial→paid, 12% churn, простои TikHub бьют по retention.\n\n---\n\n## Trial-пользователи (реалистично)\n\n| Мес | Активных trial (пик) | Trial всего (накопительно) |\n|----:|---------------------:|---------------------------:|\n| 1 | 60 | 80 |\n| 3 | 110 | 310 |\n| 6 | 160 | 780 |\n| 12 | 220 | 2 400 |\n\nПик trial ≈ 50–60% новых trial ещё в 3-дневном окне ⚠️.\n\n---\n\n## Драйверы роста (куда вкладываться)\n\n| Рычаг | Ожидаемый эффект | Стоимость |\n|-------|------------------|-----------|\n| Telegram / YouTube сообщества блогеров РФ | +30–50% верх воронки ⚠️ | Время |\n| Trial с картой + 1 000 токенов | +конверсия vs без карты ⚠️ | Комиссия эквайринга |\n| Кейсы «шпион + сценарий» | +старт trial | Контент |\n| Async ingest (надёжность) | −churn 1–2 п.п. | Разработка |\n| Реферал: 500 токенов обоим | +15% регистраций ⚠️ | COGS токенов |\n\n---\n\n## Анти-метрики\n\n| Сигнал | Действие |\n|--------|----------|\n| Trial есть, load-more = 0 | Сломан онбординг — не лить рекламу |\n| Visioner &gt; 25% базы | Пересмотреть COGS TikHub; ужесточить токены |\n| Churn paid &gt; 10% во 2-м месяце | Цена или стабильность |\n| Пакеты токенов &gt; 40% выручки | Слабая ценность подписки |\n\n---\n\n## Итог рассуждений\n\n1. **MRR месяца 1 ~100k ₽** достижим при ~20 платящих — укладывается в solo-founder.\n2. **MRR месяца 12 ~2M ₽** — ~420 платящих; реалистично при одном нишевом канале + сарафан, **не гарантия**.\n3. **Trial с картой** — как у LightReel, но в первой сессии обязаны работать ingest + сценарии (риск latency ленты из аудита).\n4. Модель **не включает** Content Radar и несуществующие фичи — только текущий продукт.\n\n\n---\n\n# Анализ себестоимости функций и токеномика\n\n> Связь функций продукта с инфраструктурой, API и внутренними весами токенов.\n> Обновлено: 2026-05-30.\n> **Тарифы/токены — см. `unit-economics.md` v2.**\n>\n> **Условные обозначения:** ✅ = есть в коде · 📋 = предложено для коммерции · ⚠️ = допущение (нет счетов поставщиков в репозитории)\n\n---\n\n## Сводка по уровням себестоимости\n\n| Уровень | Функции | Основные драйверы затрат |\n|---------|---------|--------------------------|\n| **Низкий** | Сохранения, чтение трендов, сессия/профиль, подборка из БД | Postgres, CPU Vercel |\n| **Средний** | «Ещё ролики», транскрибация, ежедневный sync конкурентов | Квота YouTube, Gro
