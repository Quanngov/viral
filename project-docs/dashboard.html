q Whisper, записи Prisma |\n| **Высокий** | Внешний ingest поиска, добавление/обновление конкурентов, сценарии | TikHub, YouTube search units, DeepSeek |\n\n---\n\n## Таблицы себестоимости по функциям\n\n### Низкая себестоимость\n\n| Функция | Инфраструктура | API | Риск для маржи | Примечания |\n|---------|----------------|-----|----------------|------------|\n| **Сохранённые ролики** | CRUD `savedVideo`; проверка до 400 ID | Нет | Низкий | Чистый Postgres |\n| **Тренды (чтение)** | Poll `GET /api/trends/realtime` | Нет при чтении | Низкий | Клиент опрашивает часто — **счёт Vercel** на масштабе, не TikHub |\n| **Профиль / сессия** | `SessionUser`, cookie, `UserTokenBalance` | Нет | Низкий | До API упирается в пул Supabase |\n| **Первая подборка ленты (БД)** | `findMany(800)` + фильтр в памяти | Нет | Низкий–средний | Тяжёлый запрос — CPU/БД |\n| **Авторизация (NextAuth)** | JWT + Google OAuth | OAuth бесплатно | Низкий | |\n\n**Риск для маржи:** по отдельности низкий. **Опрос трендов вне вкладки Home** (из аудита) умножает холостые read-запросы.\n\n---\n\n### Средняя себестоимость\n\n| Функция | Инфраструктура | API | Риск для маржи | Примечания |\n|---------|----------------|-----|----------------|------------|\n| **«Ещё ролики»** (`action: \"more\"`) | Тот же DB-путь + возможный ingest | YouTube при пустом пуле; TikHub для IG | Средний | 5 токенов в коде; порция = 8 роликов |\n| **Транскрибация** | Таймаут маршрута 120 с | Groq Whisper **⚠️ ~$0,001–0,01/мин (~0,09–0,85 ₽/мин)** | Средний | 5 токенов; субтитры обходят API |\n| **Ежедневный sync конкурента** | `competitor-daily-sync.ts` | TikHub/YouTube на профиль | Средний | 5 токенов/профиль/действие |\n| **Лог поисковых запросов** | `searchQueryLog.create` | Нет | Низкий | Рост хранилища |\n\n**Риск для маржи:** активный «load more» без сценариев всё равно жжёт YouTube/TikHub.\n\n---\n\n### Высокая себестоимость\n\n| Функция | Инфраструктура | API | Риск для маржи | Примечания |\n|---------|----------------|-----|----------------|------------|\n| **Внешний ingest поиска** | Sync YT + IG в HTTP | YouTube **100 units/search** ⚠️; TikHub **⚠️** | **Высокий** | Throttle 15 мин/запрос (`search-throttle.ts`) |\n| **Добавить конкурента (IG)** | Fetch профиля + persist | TikHub **⚠️** | Высокий | 30 токенов |\n| **Обновить Reels конкурента** | Bulk ingest | TikHub **⚠️** | Высокий | 30 токенов |\n| **Генерация сценария** | Полная история чата | DeepSeek **⚠️ ~$0,01–0,05/ген (~0,85–4,25 ₽)** | Высокий | 20 токенов; `max_tokens: 1800` |\n| **Lazy refresh трендов** | Фоновое наполнение пула | Возможен YT/TikHub | Средний–высокий | `POST /api/trends/lazy-refresh` |\n\n**Риск для маржи:** Visioner с 25k токенов без async ingest может дать **отрицательную валовую маржу** при худшем TikHub — веса токенов калибровать по счетам.\n\n---\n\n## Базовая инфраструктура (в месяц, ⚠️ допущения)\n\n| Сервис | Dev / бесплатно | ~100 платящих | ~1 000 платящих | Примечания |\n|--------|-----------------|---------------|-----------------|------------|\n| **Vercel** | Hobby $0 | Pro ~$20 (~1 700 ₽) + usage ⚠️ | Pro + overages ⚠️ $100–400 (~8 500–34 000 ₽) | Sync ingest = долгие функции |\n| **Supabase** | Free tier | Pro ~$25 (~2 100 ₽) ⚠️ | Pro + compute ⚠️ $75–150 (~6 400–12 750 ₽) | Pooler + storage |\n| **DeepSeek** | Pay-go | ⚠️ $30–150 (~2 550–12 750 ₽) | ⚠️ $200–800 (~17 000–68 000 ₽) | Растёт с числом сценариев |\n| **TikHub** | Pay-go | ⚠️ $50–300 (~4 250–25 500 ₽) | ⚠️ $500–3 000 (~42 500–255 000 ₽) | **Главная неизвестность** |\n| **YouTube Data API** | 10k units/день free | Обычно в квоте | Доп. проекты ⚠️ | 100 units/search |\n| **Groq** | Free/low | ⚠️ $10–50 (~850–4 250 ₽) | ⚠️ $50–200 (~4 250–17 000 ₽) | Fallback транскрибации |\n| **Sentry** | Опционально | ⚠️ $0–26 (~0–2 200 ₽) | Team ⚠️ | На раннем этапе опционально |\n\n*Для расчётов в таблицах юнит-экономики: **95 ₽ / USD**. В пояснениях для основателя: **~85 ₽ / USD** в скобках.*\n\n---\n\n---\n\n# Токеномика\n\n## Принципы\n\n1. **Токены ≈ COGS** — дорогие действия (TikHub, DeepSeek) стоят больше.\n2. **Первый поиск бесплатен** — как в коде; воронка без трения.\n3. **Текст для пользователя на русском** — «сколько стоит действие».\n4. **Планы дают месячный пул** — см. `pricing-overview.md`; кошелёк в коде только списывает.\n\n---\n\n## Таблица стоимости действий\n\n| Действие | Токены | Текст для пользователя | Внутренняя логика |\n|----------|-------:|------------------------|-------------------|\n| **Поиск** (первая страница) | **0** | «Поиск по базе и свежая подборка — бесплатно» | Код: DB + условный ingest; acquisition |\n| **«Ещё ролики»** | **5** | «Ещё 8 роликов — 5 токенов» | `TOKEN_COST = 5`, batch 8 |\n| **AI-разбор ролика** | **15** 📋 | «Разбор структуры и метрик — 15 токенов» | **Не в проде** (демо UI) |\n| **Генерация сценария** | **20** | «Сценарий по референсу — 20 токенов» | ~1800 max tokens out + history |\n| **Обновить Reels конкурента** | **30** | «Обновить Reels конкурента — 30 токенов» | TikHub-heavy |\n| **Ежедневный sync конкурента** | **5** | «Дневной снимок профиля — 5 токенов» | `COMPETITOR_DAILY_SYNC_TOKEN_COST` |\n| **Транскрибация** | **5** | «Текст ролика для сценария — 5 токенов» | Groq fallback |\n| **Добавить конкурента (IG)** | **30** | «Добавить Instagram-конкурента — 30 токенов» | Первый fetch включён |\n\n📋 = предложено, если ещё не выделено отдельно в коде.\n\n---\n\n## Месячные пулы токенов по тарифам\n\n| Тариф | Токены / мес | Экв. «ещё порций» | Экв. сценариев | Шпион (иллюстрация) |\n|-------|-------------:|------------------:|---------------:|---------------------|\n| Free Preview | 150 (разово) | ~30 | ~7 | Шпион нецелесообразен |\n| Trial (3 дн.) | 1 000 | ~200 | ~50 | 3 конкурента × sync × 3 дня ≈ 45 + запас |\n| Creator | 4 000 | ~800 | ~200 | 40 load-more + 15 сценариев + 5 конкурентов × 20 sync ≈ баланс |\n| Visioner | 25 000 | ~5 000 | ~1 250 | Агентство: 15 конкурентов + 60 сценариев + 200 load-more в пуле |\n\n*Эквиваленты — если тратить на один тип действия; реальный микс другой.*\n\n---\n\n## Ожидаемые паттерны использования (реалистично, в месяц)\n\n### Персона «Блогер / эксперт» (тариф Creator)\n\n| Действие | Объём/мес | Токены |\n|----------|----------:|-------:|\n| «Ещё ролики» | 35 | 175 |\n| Сценарии | 12 | 240 |\n| Транскрибация | 8 | 40 |\n| Sync конкурентов | 5 профилей × 12 дней | 300 |\n| Обновление Reels | 4 | 120 |\n| **Итого** | | **~875** |\n\nЗапас **~3 125 токенов** → допродажа пакетов или Visioner при появлении клиентов.\n\n### Персона «Агентство / контент-команда» (тариф Visioner)\n\n| Действие | Объём/мес | Токены |\n|----------|----------:|-------:|\n| «Ещё ролики» | 120 | 600 |\n| Сценарии | 45 | 900 |\n| Транскрибация | 25 | 125 |\n| Sync конкурентов | 12 профилей × 22 дня | 1 320 |\n| Обновление Reels | 15 | 450 |\n| **Итого** | | **~3 395** |\n\nБольшой запас, если командой сидят на одном аккаунте — следить за злоупотреблениями.\n\n### Персона «Free Preview»\n\n| Действие | Объём | Токены |\n|----------|-------|-------:|\n| «Ещё ролики» | 5 (далее блок) | 25 |\n| Сценарий | 1 | 20 |\n| **Итого** | | **~45** |\n\nОстаток не используют — CTA на апгрейд.\n\n---\n\n## Пакеты токенов (предложено)\n\nДемо-UI в `mock-dashboard-panels.tsx` — **заменить** цены на:\n\n| Пакет | Токены | Цена | ₽ / токен |\n|-------|-------:|-----:|----------:|\n| S | 500 | 490 ₽ | 0,98 |\n| M | 2 000 | 1 490 ₽ | 0,75 |\n| L | 5 000 | 2 990 ₽ | 0,60 |\n\nПакеты **дороже за токен**, чем подписка Creator (0,75 ₽/токен при 4k/2 990) — защита MRR.\n\n---\n\n## COGS на 1 000 потраченных токенов (⚠️ модель)\n\nМикс Creator: 50% load-more / 30% сценарии / 20% шпион:\n\n| Компонент | ₽ / 1k токенов | USD / 1k (≈) |\n|-----------|----------------:|-------------:|\n| TikHub + YouTube | **⚠️ 120–350 ₽** | $1,3–3,7 (~110–315 ₽) |\n| DeepSeek | **⚠️ 40–100 ₽** | $0,4–1,1 (~34–94 ₽) |\n| Инфра (аллокация) | **⚠️ 30–80 ₽** | $0,3–0,8 (~26–68 ₽) |\n| **COGS итого** | **⚠️ 190–530 ₽** | $2–5,6 (~170–476 ₽) |\n\nCreator: 2 990 ₽ / 4 000 токенов → **0,75 ₽ выручки на токен**.\n\n**Валовая маржа на потребление токенов:** ~30–75% в зависимости от TikHub — **проверить до масштабирования рекламы**.\n\n\n---\n\n# План масштабирования тарифов\n\n> Когда менять цену, лимиты и упаковку по этапам роста.\n> Обновлено: 2026-05-30.\n\n---\n\n## Этапы — обзор\n\n| Этап | Платящих | MRR (реалистично) | Фокус |\n|------|----------|-------------------|-------|\n| **Сейчас** | 0 (до биллинга) | 0 ₽ | Биллинг + лимиты по планам |\n| **100 paid** | ~100 | ~480k ₽ | Проверка COGS, анти-abuse |\n| **500 paid** | ~500 | ~2,4M ₽ | Опциональный средний тариф |\n| **1 000 paid** | ~1 000 | ~4,8M ₽ | Команда, push годовых |\n| **5 000 paid** | ~5 000 | ~24M ₽ | Enterprise + API |\n\n---\n\n## Текущий этап (до первой выручки)\n\n### Цены\n\n| Вопрос | Ответ |\n|--------|-------|\n| Менять цену? | **Нет** — запуск с Creator 2 990 ₽ / Visioner 14 990 ₽ |\n| Средний тариф? | **Нет** — два уровня проще; биллинг не усложнять |\n| Годовые? | **Мягкий запуск** 29 900 / 149 900 ₽ после платёжки |\n\n### Лимиты\n\n| Лимит | Действие |\n|-------|----------|\n| Заменить demo 12 400 | **Да — P0** · привязка к плану при подписке |\n| Внешний ingest на Free | **Выкл.** до биллинга |\n| Списания токенов | Оставить 5/20/30/5 из кода |\n\n### Инженерные prerequisites\n\n1. Таблица подписок + webhooks (YooKassa/Stripe)\n2. Job начисления токенов по плану\n3. `ensureSessionUser` проверяет план перед spend\n4. Убрать «оплата позже» из прод-UI\n\n---\n\n## 100 платящих (~480k ₽ MRR)\n\n### Цены\n\n| Вопрос | Ответ |\n|--------|-------|\n| Менять цену? | **Держать**, пока COGS TikHub &lt; 35% выручки |\n| Средний тариф? | **Оценить**, если &gt;30% тикетов «нужно больше токенов, но не Visioner» |\n| Пакеты токенов? | **Запустить** S/M/L (см. `feature-costs.md`) |\n\n### Лимиты\n\n| Лимит | Creator | Visioner | Причина |\n|-------|---------|----------|---------|\n| Токены / мес | 4 000 | 25 000 | Держать, пока p90 usage &lt; 80% |\n| Конкуренты | 5 | 15 | Max 10 в коде — только если COGS ок |\n| Перенос | 0 | 0 | Нет накопления перед churn |\n\n### Триггеры подорожания (+10–15%)\n\n- TikHub &gt; **0,50 ₽** на эквивалент load-more\n- Подорожание DeepSeek\n- Vercel &gt; **15%** MRR\n\n---\n\n## 500 платящих (~2,4M ₽ MRR)\n\n### Цены\n\n| Вопрос | Ответ |\n|--------|-------|\n| Менять цену? | **+10% для новых** · grandfather 6 мес |\n| Средний тариф? | **Да — если данные** · см. ниже |\n| Годовая скидка | Push **20%** (вместо 17%) в lifecycle-письмах |\n\n### Предложенный средний тариф: **Producer — 7 990 ₽ / мес** (условно)\n\nДобавлять **только если**:\n\n- &gt;25% Creator покупают пакеты 2×/мес **ИЛИ**\n- В поддержке: «нужно 10 конкурентов», но бюджета на агентство нет\n\n| Параметр | Producer (предложено) |\n|----------|---------------------|\n| Цена | 7 990 ₽ / мес · 79 900 ₽ / год |\n| Токены | 10 000 / мес |\n| Конкуренты | 10 |\n| Сохранения | 500 |\n| Аудитория | Сильный эксперт + мини-команда, SMM на нескольких клиентов |\n\n**Не добавлять**, если апгрейды на Visioner уже забирают heavy users.\n\n### Лимиты\n\n- **Мягкие caps** с авто-докупкой пакета **предложено**\n- Ingest в **async queue** — те же цены, лучше маржа\n\n---\n\n## 1 000 платящих (~4,8M ₽ MRR)\n\n### Цены\n\n| Вопрос | Ответ |\n|--------|-------|\n| Менять цену? | **Creator → 3 290 ₽** для новых, если маржа &lt; 65% (pessimistic) |\n| Visioner | Держать 14 990 ₽ — якорь для агентств |\n| Producer | Сохранить, если запущен |\n\n### Лимиты\n\n| Изменение | Причина |\n|-----------|---------|\n| Visioner 25k → 30k токенов | Perk удержания при churn &gt; 6% |\n| Место в команде +3 990 ₽/seat | Новая строка выручки; общие списки конкурентов **предложено** |\n| Rate limits API по плану | Защита контракта TikHub |\n\n### Упаковка\n\n- **Без Content Radar** — фокус\n- «Приоритетная поддержка» только в Visioner\n\n---\n\n## 5 000 платящих (~24M ₽ MRR)\n\n### Цены\n\n| Вопрос | Ответ |\n|--------|-------|\n| Enterprise | **Custom** — SSO, SLA, выделенная квота TikHub |\n| Self-serve | Creator **3 490 ₽**; Visioner **16 990 ₽** |\n| Free Preview | Ужесточить до **100 токенов** — CAC на масштабе |\n\n### Лимиты\n\n- **Жёсткий дневной бюджет TikHub** по тарифу\n- Региональные цены (СНГ vs РФ) — только с локальной оплатой\n\n### Сетка из трёх тарифов\n\n```\nCreator 3 490 ₽  →  Producer 8 990 ₽  →  Visioner 16 990 ₽\n```\n\nПереименование — по бренд-исследованию; цены ~+15% к запуску.\n\n---\n\n## Журнал решений (шаблон)\n\n| Дата | Этап | Решение | Метрика-триггер |\n|------|------|---------|-----------------|\n| — | — | — | — |\n\n---\n\n## Сводная матрица\n\n| Этап | Менять цену? | Менять лимиты? | Средний тариф? |\n|------|:------------:|:--------------:|:--------------:|\n| Сейчас | Нет | Да (биллинг) | Нет |\n| 100 | Держать | Пакеты токенов | Нет |\n| 500 | +10% опционально | Async ingest | **По данным** |\n| 1 000 | Индекс Creator | Места в команде | Да, если не было |\n| 5 000 | Индекс всех | Дневные caps API | Да (стандарт 3-tier) |\n"}}</script>
  <script>
(function () {
  "use strict";

  var payload = JSON.parse(document.getElementById("docs-json").textContent);
  var SECTIONS = payload.sections;
  var SOURCES = payload.sources;
  var CHATGPT_ID = "chatgpt";

  var currentSection = "overview";
  var currentMode = "brief";

  var MAINTENANCE_MD =
    "## Обновление документации\n\n" +
    "| Что | Файл |\n" +
    "|-----|------|\n" +
    "| Обзор, потоки | `00-project-overview.md` |\n" +
    "| Архитектура | `01-architecture.md` |\n" +
    "| Изменения в коде | `02-change-log.md` |\n" +
    "| AI / промпты | `03-ai-prompts.md` |\n" +
    "| Интеграции | `04-services-and-integrations.md` |\n" +
    "| Решения | `05-known-decisions.md` |\n" +
    "| Аудиты | `06-audits.md` |\n" +
    "| Roadmap | `07-roadmap.md` |\n" +
    "| Тарифы, экономика | `pricing/*.md` |\n\n" +
    "```bash\nnode project-docs/build-dashboard.mjs\n```\n\n" +
    "Единый дэшборд: `project-docs/dashboard.html` (работает через `file://`).";

  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function inlineFormat(s) {
    s = escapeHtml(s);
    s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/\*([^*]+)\*/g, "<em>$1</em>");
    s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    return s;
  }

  function isSeparatorRow(row) {
    return row.every(function (c) {
      return /^[-:\s|]+$/.test(c.trim());
    });
  }

  function renderMarkdown(md) {
    if (!md) return "<p><em>Нет данных</em></p>";
    var lines = md.replace(/\r\n/g, "\n").split("\n");
    var html = [];
    var i = 0;
    var inCode = false;
    var codeBuf = [];
    var tableBuf = null;

    function flushTable() {
      if (!tableBuf || tableBuf.length < 1) return;
      html.push("<table>");
      tableBuf.forEach(function (row, ri) {
        if (ri === 1 && isSeparatorRow(row)) return;
        var tag = ri === 0 ? "th" : "td";
        html.push(
          "<tr>" +
            row
              .map(function (c) {
                return "<" + tag + ">" + inlineFormat(c.trim()) + "</" + tag + ">";
              })
              .join("") +
            "</tr>",
        );
      });
      html.push("</table>");
      tableBuf = null;
    }

    while (i < lines.length) {
      var line = lines[i];

      if (line.startsWith("```")) {
        if (inCode) {
          html.push("<pre><code>" + escapeHtml(codeBuf.join("\n")) + "</code></pre>");
          codeBuf = [];
          inCode = false;
        } else {
          flushTable();
          inCode = true;
        }
        i++;
        continue;
      }
      if (inCode) {
        codeBuf.push(line);
        i++;
        continue;
      }

      if (/^\|.+\|$/.test(line.trim())) {
        if (!tableBuf) tableBuf = [];
        tableBuf.push(line.split("|").slice(1, -1));
        i++;
        continue;
      }
      flushTable();

      if (/^---+$/.test(line.trim())) {
        html.push("<hr>");
        i++;
        continue;
      }
      if (/^# (.+)$/.test(line)) {
        html.push("<h1>" + inlineFormat(line.slice(2)) + "</h1>");
        i++;
        continue;
      }
      if (/^## (.+)$/.test(line)) {
        html.push("<h2>" + inlineFormat(line.slice(3)) + "</h2>");
        i++;
        continue;
      }
      if (/^### (.+)$/.test(line)) {
        html.push("<h3>" + inlineFormat(line.slice(4)) + "</h3>");
        i++;
        continue;
      }
      if (/^> (.+)$/.test(line)) {
        html.push("<blockquote>" + inlineFormat(line.slice(2)) + "</blockquote>");
        i++;
        continue;
      }
      if (/^[-*] (.+)$/.test(line)) {
        html.push("<ul>");
        while (i < lines.length && /^[-*] (.+)$/.test(lines[i])) {
          html.push("<li>" + inlineFormat(lines[i].replace(/^[-*] /, "")) + "</li>");
          i++;
        }
        html.push("</ul>");
        continue;
      }
      if (/^\d+\. (.+)$/.test(line)) {
        html.push("<ol>");
        while (i < lines.length && /^\d+\. (.+)$/.test(lines[i])) {
          html.push("<li>" + inlineFormat(lines[i].replace(/^\d+\. /, "")) + "</li>");
          i++;
        }
        html.push("</ol>");
        continue;
      }
      if (line.trim() === "") {
        i++;
        continue;
      }
      html.push("<p>" + inlineFormat(line) + "</p>");
      i++;
    }
    flushTable();
    if (inCode && codeBuf.length) {
      html.push("<pre><code>" + escapeHtml(codeBuf.join("\n")) + "</code></pre>");
    }
    return html.join("\n");
  }

  function getSection(id) {
    for (var i = 0; i < SECTIONS.length; i++) {
      if (SECTIONS[i].id === id) return SECTIONS[i];
    }
    return null;
  }

  function getSectionContent(id, mode) {
    var sec = getSection(id);
    if (!sec) return "";
    return mode === "detailed" ? sec.detailed : sec.brief;
  }

  function buildFullContext() {
    var date = new Date().toISOString().slice(0, 10);
    var parts = [
      "# Viral — полный контекст проекта",
      "Дата: " + date,
      "Задача: помоги с продуктом, кодом, тарифами и приоритетами для SaaS в РФ/СНГ.\n",
    ];
    SECTIONS.forEach(function (s) {
      parts.push("## " + s.label + " (кратко)\n");
      parts.push(s.brief);
      parts.push("");
    });
    return parts.join("\n");
  }

  function buildPricingCopy() {
    return (
      "# Viral — тарифы\n\n" +
      getSectionContent("business", "brief") +
      "\n\n---\n\n" +
      extractFromSource(SOURCES.pricing, "## Списания токенов", "## Позиционирование")
    );
  }

  function buildEconomicsCopy() {
    return "# Viral — юнит-экономика\n\n" + SOURCES.economics;
  }

  function buildProblemsCopy() {
    return "# Viral — проблемы и roadmap\n\n" + getSectionContent("problems", "brief");
  }

  function extractFromSource(md, start, end) {
    var i = md.indexOf(start);
    if (i < 0) return "";
    if (!end) return md.slice(i);
    var j = md.indexOf(end, i + start.length);
    return j < 0 ? md.slice(i) : md.slice(i, j);
  }

  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(showToast).catch(function () {
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand("copy");
      showToast();
    } catch (e) {
      alert("Не удалось скопировать");
    }
    document.body.removeChild(ta);
  }

  function showToast() {
    var t = document.getElementById("toast");
    t.classList.add("show");
    setTimeout(function () {
      t.classList.remove("show");
    }, 1500);
  }

  var nav = document.getElementById("nav");
  var toolbar = document.getElementById("toolbar");
  var content = document.getElementById("content");
  var maintenance = document.getElementById("maintenance");

  var navItems = SECTIONS.concat([{ id: CHATGPT_ID, label: "Для ChatGPT" }]);

  navItems.forEach(function (item, idx) {
    var btn = document.createElement("button");
    btn.textContent = item.label;
    btn.dataset.id = item.id;
    btn.addEventListener("click", function () {
      showSection(item.id);
    });
    nav.appendChild(btn);
    if (idx === 0) btn.classList.add("active");
  });

  function renderToolbar() {
    toolbar.innerHTML = "";

    if (currentSection === CHATGPT_ID) return;

    var toggle = document.createElement("div");
    toggle.className = "mode-toggle";

    ["brief", "detailed"].forEach(function (mode) {
      var mb = document.createElement("button");
      mb.textContent = mode === "brief" ? "Кратко" : "Подробно";
      mb.dataset.mode = mode;
      if (currentMode === mode) mb.classList.add("active");
      mb.addEventListener("click", function () {
        currentMode = mode;
        renderToolbar();
        renderContent();
        updateHash();
      });
      toggle.appendChild(mb);
    });

    toolbar.appendChild(toggle);
  }

  function renderChatGptPanel() {
    var html =
      "<h1>Для ChatGPT</h1>" +
      '<div class="chatgpt-panel">' +
      "<p>Скопируйте готовый контекст — без чтения десятков страниц. " +
      "Краткие выжимки для быстрых вопросов; полные документы — в соответствующих кнопках.</p>" +
      '<div class="chatgpt-grid" id="chatgpt-grid"></div></div>';

    content.innerHTML = html;

    var grid = document.getElementById("chatgpt-grid");
    var buttons = [
      { label: "Полный контекст проекта", fn: buildFullContext, primary: true },
      { label: "Архитектура", fn: function () { return SOURCES.architecture; } },
      { label: "История изменений", fn: function () { return SOURCES.history; } },
      { label: "Тарифы", fn: buildPricingCopy },
      { label: "Юнит-экономика", fn: buildEconomicsCopy },
      { label: "Проблемы", fn: buildProblemsCopy },
    ];

    buttons.forEach(function (b) {
      var btn = document.createElement("button");
      btn.textContent = b.label;
      if (b.primary) btn.classList.add("primary");
      btn.addEventListener("click", function () {
        copyText(b.fn());
      });
      grid.appendChild(btn);
    });
  }

  function renderContent() {
    if (currentSection === CHATGPT_ID) {
      renderChatGptPanel();
      return;
    }
    content.innerHTML = renderMarkdown(getSectionContent(currentSection, currentMode));
  }

  function updateHash() {
    try {
      var h = currentSection === CHATGPT_ID ? CHATGPT_ID : currentSection + "-" + currentMode;
      if (location.hash !== "#" + h) {
        history.replaceState(null, "", "#" + h);
      }
    } catch (e) {
      /* file:// */
    }
  }

  function showSection(id) {
    currentSection = id;
    if (id !== CHATGPT_ID) {
      currentMode = "brief";
    }
    nav.querySelectorAll("button").forEach(function (b) {
      b.classList.toggle("active", b.dataset.id === id);
    });
    renderToolbar();
    renderContent();
    updateHash();
  }

  function parseHash() {
    var hash = "";
    try {
      hash = location.hash.slice(1);
    } catch (e) {
      return { section: "overview", mode: "brief" };
    }
    if (!hash) return { section: "overview", mode: "brief" };
    if (hash === CHATGPT_ID) return { section: CHATGPT_ID, mode: "brief" };
    if (hash.endsWith("-detailed")) {
      return { section: hash.replace(/-detailed$/, ""), mode: "detailed" };
    }
    if (hash.endsWith("-brief")) {
      return { section: hash.replace(/-brief$/, ""), mode: "brief" };
    }
    var known = navItems.some(function (n) {
      return n.id === hash;
    });
    if (known) return { section: hash, mode: "brief" };
    return { section: "overview", mode: "brief" };
  }

  maintenance.innerHTML = renderMarkdown(MAINTENANCE_MD);

  var initial = parseHash();
  currentSection = initial.section;
  currentMode = initial.mode;
  if (currentSection === CHATGPT_ID) currentMode = "brief";

  nav.querySelectorAll("button").forEach(function (b) {
    b.classList.toggle("active", b.dataset.id === currentSection);
  });
  renderToolbar();
  renderContent();
})();

  </script>
</body>
</html>
